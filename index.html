<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>상식퀴즈대전 - 실시간 멀티플레이</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f172a;
      --card: #1e293b;
      --border: #334155;
      --focus: #3b82f6;
      --input-bg: #0f172a;
      --text: #ffffff;
      --sub: #94a3b8;
      --muted: #64748b;
      --blue: #2563eb;
      --gold: #f59e0b;
      --red: #ef4444;
      --green: #10b981;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    #app {
      width: 100%;
      max-width: 440px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background: var(--bg);
      position: relative;
    }
    @media (min-width: 480px) {
      #app {
        min-height: 820px;
        height: 820px;
        border-radius: 20px;
        border: 1px solid var(--border);
        margin: 20px 0;
        overflow: hidden;
        box-shadow: 0 25px 60px -10px #000a;
      }
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px;
      width: 100%;
    }
    input, select {
      width: 100%;
      height: 48px;
      padding: 0 14px;
      background: var(--input-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 0.95rem;
      font-family: inherit;
      outline: none;
    }
    input:focus, select:focus { border-color: var(--focus); }
    button {
      height: 48px;
      padding: 0 18px;
      border-radius: 10px;
      border: none;
      font-size: 0.9rem;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      color: #fff;
      background: var(--blue);
      transition: opacity 0.15s;
    }
    button:hover { opacity: 0.85; }
    button:disabled { opacity: 0.35; cursor: not-allowed; }
    .btn-gold { background: var(--gold); color: #000; }
    .btn-red { background: var(--red); }
    .btn-sub { background: var(--border); color: var(--text); }
    .avatar {
      width: 38px; height: 38px;
      border-radius: 50%;
      background: linear-gradient(135deg, #3b82f6, #1d4ed8);
      color: #fff; font-weight: 900; font-size: 1rem;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .chip {
      padding: 3px 9px; border-radius: 7px;
      font-size: 0.72rem; font-weight: 800;
      display: inline-flex; align-items: center;
    }
    .chip-host { background:#f59e0b22; color:var(--gold); border:1px solid #f59e0b55; }
    .chip-ready { background:#10b98122; color:var(--green); border:1px solid #10b98155; }
    .chip-wait { background:#ef444422; color:var(--red); border:1px solid #ef444455; }
    .chip-ok { background:#10b98122; color:var(--green); border:1px solid #10b98155; }
    .chip-err { background:#ef444422; color:var(--red); border:1px solid #ef444455; }
    .timer-wrap { width:100%; height:7px; background:#fff2; border-radius:4px; overflow:hidden; margin:12px 0; }
    .timer-fill { height:100%; background:var(--focus); transition:width 0.1s linear,background 0.2s; }
    .timer-fill.warn { background:var(--red); }
    .q-box {
      background:var(--card); border:1px solid var(--border);
      border-radius:14px; padding:28px 18px;
      text-align:center; font-size:1.15rem; font-weight:700;
      line-height:1.6; min-height:150px;
      display:flex; align-items:center; justify-content:center;
      margin-bottom:14px;
    }
    .bottom-bar {
      margin-top:auto; padding:14px 18px;
      background:var(--bg); border-top:1px solid var(--border);
    }
    .overlay {
      position:absolute; top:0; left:0; width:100%; height:100%;
      background:#0f172aee; backdrop-filter:blur(8px);
      display:flex; align-items:center; justify-content:center;
      padding:20px; z-index:100;
    }
    .overlay-box {
      background:var(--card); border:1px solid var(--border);
      border-radius:16px; width:100%; padding:22px;
    }
    .podium-wrap { display:flex; justify-content:center; align-items:flex-end; gap:12px; height:220px; margin:16px 0 24px; }
    .podium-slot { display:flex; flex-direction:column; align-items:center; flex:1; height:100%; justify-content:flex-end; }
    .podium-box { width:100%; border-radius:10px 10px 0 0; display:flex; align-items:center; justify-content:center; font-weight:900; font-size:1.4rem; color:#fff; }
    .podium-slot.r1 .podium-box { height:130px; background:linear-gradient(180deg,#f59e0b,#d97706); color:#000; }
    .podium-slot.r2 .podium-box { height:90px; background:linear-gradient(180deg,#94a3b8,#475569); }
    .podium-slot.r3 .podium-box { height:65px; background:linear-gradient(180deg,#b45309,#78350f); }
    .p-name { font-size:0.88rem; font-weight:800; text-align:center; margin-bottom:2px; }
    .p-score { font-size:0.8rem; color:var(--sub); margin-bottom:6px; }
  </style>
</head>
<body>
<div id="app"></div>
<script>
(function() {
  "use strict";

  // ── 식별자 ──────────────────────────────────────────────
  if (!window.name || !window.name.startsWith("ts_"))
    window.name = "ts_" + Math.random().toString(36).substr(2, 9) + "_" + Date.now();
  var MY_ID = "u_" + window.name;
  var WS_URL = "wss://free.piesocket.com/v3/trivia_battle_v7?api_key=VCXScKGBs8mMVQqEizqDYrKPvdM82fQQFiGAKebn&notify_self=1";

  // ── 네트워크 ─────────────────────────────────────────────
  var handlers = new Set();
  var ws = null;
  var bc = null;
  var pingTimer = null;

  function initNet(handler) {
    if (handler) handlers.add(handler);
    if (!bc && typeof BroadcastChannel !== "undefined") {
      try {
        bc = new BroadcastChannel("TQ_LOCAL_V7");
        bc.onmessage = function(e) { if (e && e.data) dispatch(e.data); };
      } catch(err) {}
    }
    connectWS();
    return function() { if (handler) handlers.delete(handler); };
  }

  function connectWS() {
    try {
      if (ws) ws.close();
      ws = new WebSocket(WS_URL);
      ws.onopen = function() {
        console.log("WS connected");
        if (pingTimer) clearInterval(pingTimer);
        pingTimer = setInterval(function() {
          if (ws && ws.readyState === 1) ws.send(JSON.stringify({type:"PING",sid:MY_ID}));
        }, 5000);
        send("REQ_ROOM_LIST", {});
      };
      ws.onmessage = function(e) {
        try {
          var msg = JSON.parse(e.data);
          if (msg && msg.type && msg.type !== "PING") dispatch(msg);
        } catch(err) {}
      };
      ws.onclose = function() {
        if (pingTimer) clearInterval(pingTimer);
        setTimeout(connectWS, 2000);
      };
      ws.onerror = function() {};
    } catch(err) { setTimeout(connectWS, 3000); }
  }

  function send(type, payload) {
    var msg = { type: type, payload: payload || {}, sid: MY_ID, ts: Date.now() };
    if (bc) { try { bc.postMessage(msg); } catch(err) {} }
    if (ws && ws.readyState === 1) { try { ws.send(JSON.stringify(msg)); } catch(err) {} }
  }

  function dispatch(msg) {
    handlers.forEach(function(h) { try { h(msg); } catch(err) {} });
  }

  // ── 방 상태 (인메모리) ───────────────────────────────────
  var rooms = new Map();

  function getRooms() {
    return Array.from(rooms.values()).filter(function(r) {
      return r && Array.isArray(r.players) && r.players.length > 0;
    });
  }
  function setRooms(list) {
    rooms.clear();
    if (!Array.isArray(list)) return;
    list.forEach(function(r) {
      if (r && r.id && Array.isArray(r.players) && r.players.length > 0) rooms.set(r.id, r);
    });
  }
  function upsertRoom(r) {
    if (!r || !r.id) return;
    if (!r.players || r.players.length === 0) rooms.delete(r.id);
    else rooms.set(r.id, r);
  }

  function createRoom(opts) {
    var host = opts.hostNickname;
    var myId = MY_ID;
    // 기존에 내가 있던 방에서 제거
    rooms.forEach(function(r, id) {
      r.players = r.players.filter(function(p) { return p.id !== myId; });
      if (r.players.length === 0) rooms.delete(id);
    });
    var room = {
      id: "rm_" + Math.random().toString(36).substr(2, 6),
      title: opts.title || host + "님의 방",
      category: opts.category || "all",
      maxPlayers: Number(opts.maxPlayers) || 4,
      hostId: myId,
      status: "waiting",
      players: [{id:myId, nickname:host, avatar:host[0].toUpperCase(), isHost:true, isReady:true, score:0, totalTime:0}],
      quizSet: [], qIdx: 0, startTime: 0, subs: {}
    };
    rooms.set(room.id, room);
    send("ROOM_LIST_UPDATE", { rooms: getRooms() });
    return room;
  }

  function joinRoom(roomId, player) {
    var room = rooms.get(roomId);
    if (!room) return null;
    if (!room.players.find(function(p) { return p.id === player.id; })) {
      if (room.players.length >= room.maxPlayers) { alert("방이 가득 찼습니다."); return null; }
      room.players.push({ id:player.id, nickname:player.nickname, avatar:player.nickname[0].toUpperCase(), isHost:false, isReady:false, score:0, totalTime:0 });
    }
    rooms.set(room.id, room);
    send("ROOM_STATE_UPDATE", { room: room });
    send("ROOM_LIST_UPDATE", { rooms: getRooms() });
    return room;
  }

  function toggleReady(roomId, playerId) {
    var room = rooms.get(roomId);
    if (!room) return;
    var p = room.players.find(function(p) { return p.id === playerId; });
    if (p && !p.isHost) { p.isReady = !p.isReady; rooms.set(room.id, room); send("ROOM_STATE_UPDATE", { room: room }); }
  }

  function leaveRoom(roomId, playerId) {
    var room = rooms.get(roomId);
    if (!room) return;
    var wasHost = room.hostId === playerId;
    room.players = room.players.filter(function(p) { return p.id !== playerId; });
    if (room.players.length === 0) {
      rooms.delete(roomId);
    } else {
      if (wasHost) {
        room.players[0].isHost = true; room.players[0].isReady = true; room.hostId = room.players[0].id;
        send("ROOM_DISBANDED", { roomId: roomId });
      }
      rooms.set(roomId, room);
    }
    send("ROOM_STATE_UPDATE", { room: room });
    send("ROOM_LIST_UPDATE", { rooms: getRooms() });
  }

  window.addEventListener("beforeunload", function() {
    rooms.forEach(function(r) { if (r.players.some(function(p){return p.id===MY_ID;})) leaveRoom(r.id, MY_ID); });
  });

    {id:"q002",sc:1,cat:"science",q:"원소 기호 Au에 해당하는 귀금속은?",a:["금","gold"],hint:"24k로 표시"},

    {id:"q004",sc:1,cat:"science",q:"지구 대기 성분 중 가장 높은 비율(약 78%)을 차지하는 기체는?",a:["질소","nitrogen"],hint:"과자 봉지에 충전"},

    {id:"q007",sc:1,cat:"culture",q:"판도라 상자에 마지막으로 남은 것은?",a:["희망","hope"],hint:"그리스 신화"},
    {id:"q008",sc:1,cat:"science",q:"물질의 세 가지 기본 상태 중 액체, 기체가 아닌 나머지는?",a:["고체","solid"],hint:"얼음 같은 상태"},
    {id:"q009",sc:1,cat:"geography",q:"아프리카 대륙을 관류하는 세계에서 가장 긴 강은?",a:["나일강","나일 강","nile"],hint:"이집트 문명의 젖줄"},
    {id:"q010",sc:1,cat:"economy",q:"물가가 지속적으로 상승하는 경제 현상은?",a:["인플레이션","inflation"],hint:"디플레이션 반대"},

  ];

  function normalize(s) {
    if (!s) return "";
    return String(s).toLowerCase().trim()
      .replace(/\s+/g,"").replace(/[.,!?]/g,"")
      .replace(/킬로미터/g,"km").replace(/개$/,"").replace(/점$/,"");
  }

  function checkAnswer(userAns, correctList) {
    if (!userAns || !Array.isArray(correctList)) return false;
    var u = normalize(userAns);
    if (!u) return false;
    return correctList.some(function(a) {
      var c = normalize(a);
      if (c === u) return true;
      var un = u.replace(/[^0-9.]/g,""), cn = c.replace(/[^0-9.]/g,"");
      return un && cn && un === cn;
    });
  }

  function shuffle(arr) {
    var a = arr.slice();
    for (var i = a.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
    }
    return a;
  }

  function buildQuizSet(category) {
    var ones = QDB.filter(function(q) { return q.sc === 1; });
    var twos = QDB.filter(function(q) { return q.sc === 2; });
    if (category !== "all") {
      var filtered = ones.filter(function(q) { return q.cat === category; });
      if (filtered.length >= 9) ones = filtered;
    }
    return shuffle(ones).slice(0, 9).concat(shuffle(twos).slice(0, 1));
  }

  // ── 카테고리 라벨 ─────────────────────────────────────────
  function catLabel(c) {
    return {all:"전체",history:"역사",science:"과학",sports:"스포츠",economy:"경제",culture:"문화",geography:"지리"}[c] || c;
  }

  // ── 앱 상태 ──────────────────────────────────────────────
  var appState = "LOBBY";   // LOBBY | WAITING | QUIZ | RESULT
  var profile = null;        // {nickname, avatar}
  var curRoomId = null;
  var curRoom = null;
  var qIdx = 0;
  var timeLeft = 15;
  var submitted = false;
  var submittedAns = "";
  var roundOverlay = null;   // overlay data
  var timerInterval = null;
  var resultTimeout = null;

  var appEl = document.getElementById("app");

  // 저장된 프로필 복원
  try { profile = JSON.parse(sessionStorage.getItem("tq_profile")); } catch(err) {}

  // ── 렌더 ─────────────────────────────────────────────────
  function render() {
    appEl.innerHTML = "";
    if (!profile || !profile.nickname) {
      renderNickname();
    } else if (appState === "WAITING" && curRoom) {
      renderWaiting();
    } else if (appState === "QUIZ" && curRoom) {
      renderQuiz();
    } else if (appState === "RESULT" && curRoom) {
      renderResult();
    } else {
      renderLobby();
    }
  }

  function doCreate(opts) {
    opts.hostNickname = profile.nickname;
    var room = createRoom(opts);
    curRoomId = room.id;
    curRoom = room;
    appState = "WAITING";
    render();
  }

  function doJoin(roomId) {
    var room = joinRoom(roomId, { id: MY_ID, nickname: profile.nickname });
    if (!room) return;
    curRoomId = roomId;
    curRoom = room;
    appState = "WAITING";
    render();
  }

  function renderWaiting() {
    var room = curRoom;
    var me = room.players.find(function(p) { return p.id === MY_ID; });
    var iAmHost = room.hostId === MY_ID;
    var allReady = room.players.filter(function(p) { return !p.isHost; }).every(function(p) { return p.isReady; });
    var canStart = iAmHost && room.players.length >= 2 && allReady;

    var div = document.createElement("div");
    div.style.cssText = "display:flex;flex-direction:column;height:100%;padding:18px;";
    div.innerHTML = [
      '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;border-bottom:1px solid var(--border);padding-bottom:16px;">',
      '<div>',
      '<h2 style="font-size:1.2rem;font-weight:900;">' + room.title + '</h2>',
      '<p style="color:var(--sub);font-size:0.78rem;margin-top:3px;">' + catLabel(room.category) + ' | ' + room.players.length + '/' + room.maxPlayers + ' 명</p>',

      '<div style="display:flex;flex-direction:column;gap:8px;">',
      room.players.map(function(p) {
        return '<div style="display:flex;align-items:center;justify-content:space-between;background:var(--input-bg);padding:10px 14px;border-radius:10px;border:1px solid var(--border);">' +
          '<div style="display:flex;align-items:center;gap:10px;">' +
          '<div class="avatar">' + p.nickname[0].toUpperCase() + '</div>' +
          '<span style="font-weight:800;font-size:0.9rem;">' + p.nickname + (p.id === MY_ID ? ' <span style="color:var(--focus);font-size:0.75rem;">(나)</span>' : '') + '</span>' +
          '</div>' +
          (p.isHost ? '<span class="chip chip-host">HOST</span>' : '<span class="chip ' + (p.isReady ? 'chip-ready' : 'chip-wait') + '">' + (p.isReady ? 'READY' : 'WAITING') + '</span>') +
          '</div>';
      }).join(""),
      '</div></div>',
      '<div>',
      iAmHost
        ? '<button id="start-btn"' + (canStart ? '' : ' disabled') + ' class="btn-gold" style="width:100%;">게임 시작 ' + (canStart ? '✓' : '(모두 READY 필요)') + '</button>'
        : '<button id="ready-btn" class="' + (me && me.isReady ? 'btn-sub' : '') + '" style="width:100%;">' + (me && me.isReady ? 'READY 취소' : '준비 완료 (READY)') + '</button>',
      '</div>'
    ].join("");

      leaveRoom(curRoomId, MY_ID);
      curRoomId = null; curRoom = null; appState = "LOBBY"; render();
    });
    var startBtn = document.getElementById("start-btn");
    if (startBtn) startBtn.addEventListener("click", function() {
      if (!canStart) return;
      startGame();
    });
    var readyBtn = document.getElementById("ready-btn");
    if (readyBtn) readyBtn.addEventListener("click", function() {
      toggleReady(curRoomId, MY_ID); render();
    });
  }

  function startGame() {
    var quiz = buildQuizSet(curRoom.category);
    curRoom.quizSet = quiz;
    curRoom.qIdx = 0;
    curRoom.status = "playing";
    curRoom.startTime = Date.now();
    curRoom.subs = {};
    upsertRoom(curRoom);
    send("GAME_STARTED", { roomId: curRoomId, room: curRoom, quizSet: quiz, startTime: curRoom.startTime });
    beginRound(0, curRoom.startTime);
  }

  // ── 퀴즈 화면 ─────────────────────────────────────────────
  function beginRound(idx, startTs) {
    if (timerInterval) clearInterval(timerInterval);
    if (resultTimeout) clearTimeout(resultTimeout);
    qIdx = idx;
    submitted = false;
    submittedAns = "";
    roundOverlay = null;
    if (curRoom) { curRoom.qIdx = idx; curRoom.startTime = startTs; }
    var elapsed = Math.floor((Date.now() - startTs) / 1000);
    timeLeft = Math.max(0, 15 - elapsed);
    appState = "QUIZ";
    render();
    timerInterval = setInterval(function() {
      var elapsed2 = Math.floor((Date.now() - (curRoom ? curRoom.startTime : startTs)) / 1000);
      timeLeft = Math.max(0, 15 - elapsed2);
      updateTimer();
      if (timeLeft <= 0) {
        clearInterval(timerInterval); timerInterval = null;
        timeLeft = 0; updateTimer();
        if (isHost()) evaluateRound();
      }
    }, 500);
  }

  function isHost() { return curRoom && curRoom.hostId === MY_ID; }

  function renderQuiz() {
    var room = curRoom;
    var quiz = room.quizSet[qIdx] || room.quizSet[0];
    var total = room.quizSet.length;
    var isGolden = quiz.sc === 2 || qIdx === total - 1;
    var timerPct = timeLeft / 15 * 100;
    var isWarn = timeLeft <= 4;

    var div = document.createElement("div");
    div.style.cssText = "display:flex;flex-direction:column;height:100%;position:relative;";
    div.innerHTML = [
      '<div style="padding:18px 18px 10px;">',
      '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">',
      '<div>',
      '<div style="font-size:0.75rem;color:var(--sub);">QUESTION</div>',
      '<h3 style="font-size:1.2rem;font-weight:900;">Q.' + (qIdx+1) + ' / ' + total + '</h3>',
      '</div>',
      isGolden
        ? '<span class="chip chip-host" style="font-size:0.8rem;padding:5px 11px;">골든벨 2점</span>'
        : '<span class="chip" style="background:var(--border);color:var(--sub);font-size:0.8rem;padding:5px 11px;">일반 1점</span>',
      '</div>',
      '<div class="timer-wrap"><div id="t-bar" class="timer-fill' + (isWarn ? ' warn' : '') + '" style="width:' + timerPct + '%;"></div></div>',
      '<div style="display:flex;justify-content:space-between;font-size:0.78rem;color:var(--muted);margin-top:-8px;margin-bottom:12px;">',
      '<span>남은 시간</span>',
      '<span id="t-text" style="font-weight:900;color:' + (isWarn ? 'var(--red)' : 'var(--focus)') + ';">' + timeLeft + '초</span>',
      '</div></div>',
      '<div style="padding:0 18px;flex:1;overflow-y:auto;">',
      '<div class="q-box">' + quiz.q + '</div>',
      '<div class="card" style="padding:10px 14px;margin-bottom:14px;">',
      '<div style="font-size:0.78rem;font-weight:700;color:var(--sub);margin-bottom:8px;">제출 현황</div>',
      '<div style="display:flex;flex-wrap:wrap;gap:6px;">',
      room.players.map(function(p) {
        var hasSub = room.subs && room.subs[qIdx] && room.subs[qIdx][p.id];
        return '<div style="display:flex;align-items:center;gap:5px;background:var(--input-bg);padding:3px 8px;border-radius:7px;font-size:0.78rem;border:1px solid var(--border);">' +
          '<span style="font-weight:800;">' + p.nickname + '</span>' +
          '<span class="chip ' + (hasSub ? 'chip-ok' : 'chip-err') + '" style="font-size:0.68rem;padding:1px 5px;">' + (hasSub ? '제출' : '대기') + '</span>' +
          '</div>';
      }).join(""),
      '</div></div></div>',
      '<div class="bottom-bar">',
      '<form id="ans-form" style="display:flex;gap:8px;">',
      '<input id="ans-in" type="text" placeholder="' + (submitted ? '제출 완료' : '정답 입력 후 엔터') + '" value="' + (submittedAns || '') + '" ' + (submitted || timeLeft <= 0 ? 'disabled' : '') + ' style="flex:1;">',
      '<button type="submit" class="' + (isGolden ? 'btn-gold' : '') + '" style="width:80px;" ' + (submitted || timeLeft <= 0 ? 'disabled' : '') + '>' + (submitted ? '완료' : '제출') + '</button>',
      '</form></div>'
    ].join("");
    appEl.appendChild(div);

    var form = document.getElementById("ans-form");
    if (form) form.addEventListener("submit", function(e) {
      e.preventDefault();
      var ans = document.getElementById("ans-in").value.trim();
      if (!ans) { alert("답안을 입력해 주세요."); return; }
      submitAnswer(ans);
    });

    if (roundOverlay) showRoundOverlay(roundOverlay);
  }

  function updateTimer() {
    var bar = document.getElementById("t-bar");
    var txt = document.getElementById("t-text");
    if (bar && txt) {
      var pct = timeLeft / 15 * 100;
      var warn = timeLeft <= 4;
      bar.style.width = pct + "%";
      bar.className = "timer-fill" + (warn ? " warn" : "");
      txt.textContent = timeLeft + "초";
      txt.style.color = warn ? "var(--red)" : "var(--focus)";
    }
  }

  function submitAnswer(ans) {
    if (submitted) return;
    submitted = true;
    submittedAns = ans;
    var quiz = curRoom.quizSet[qIdx];
    var correct = checkAnswer(ans, quiz.a);
    var earnedScore = correct ? quiz.sc : 0;
    var timeTaken = Date.now() - curRoom.startTime;
    var sub = { playerId: MY_ID, nickname: profile.nickname, answer: ans, isCorrect: correct, score: earnedScore, timeTaken: timeTaken };
    if (!curRoom.subs) curRoom.subs = {};
    if (!curRoom.subs[qIdx]) curRoom.subs[qIdx] = {};
    curRoom.subs[qIdx][MY_ID] = sub;
    upsertRoom(curRoom);
    send("SUBMITTED_ANSWER", { roomId: curRoomId, qIdx: qIdx, sub: sub });
    if (isHost()) checkAllSubmitted();
    render();
  }

  function checkAllSubmitted() {
    if (!isHost() || !curRoom) return;
    var subs = (curRoom.subs && curRoom.subs[qIdx]) || {};
    if (Object.keys(subs).length >= curRoom.players.length) {
      if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
      evaluateRound();
    }
  }

  function evaluateRound() {
    if (!isHost() || !curRoom) return;
    var quiz = curRoom.quizSet[qIdx];
    var subs = (curRoom.subs && curRoom.subs[qIdx]) || {};
    var playerResults = curRoom.players.map(function(p) {
      var s = subs[p.id];
      var correct = s ? s.isCorrect : false;
      var earned = correct ? quiz.sc : 0;
      p.score = (p.score || 0) + earned;
      p.totalTime = (p.totalTime || 0) + (s ? s.timeTaken : 15000);
      return { id: p.id, nickname: p.nickname, isCorrect: correct, earnedScore: earned, score: p.score, userAnswer: s ? s.answer : "" };
    });
    upsertRoom(curRoom);
    var result = { qIdx: qIdx, correctAnswerText: quiz.a[0], players: playerResults, room: curRoom };
    send("ROUND_RESULT", { roomId: curRoomId, result: result });
    handleRoundResult(result);
  }

  function handleRoundResult(result) {
    if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
    roundOverlay = result;
    if (result.room) { curRoom = result.room; upsertRoom(curRoom); }
    render();
    if (resultTimeout) clearTimeout(resultTimeout);
    resultTimeout = setTimeout(function() {
      roundOverlay = null;
      if (isHost()) {
        var nextIdx = qIdx + 1;
        if (curRoom && nextIdx < curRoom.quizSet.length) {
          curRoom.startTime = Date.now();
          upsertRoom(curRoom);
          send("NEXT_ROUND", { roomId: curRoomId, qIdx: nextIdx, startTime: curRoom.startTime });
          beginRound(nextIdx, curRoom.startTime);
        } else {
          send("GAME_OVER", { roomId: curRoomId });
          appState = "RESULT"; render();
        }
      }
    }, 3500);
  }

  function showRoundOverlay(result) {
    var overlay = document.createElement("div");
    overlay.className = "overlay";
    var correct = result.players.filter(function(p) { return p.isCorrect; });
    var wrong = result.players.filter(function(p) { return !p.isCorrect; });
    overlay.innerHTML = [
      '<div class="overlay-box">',
      '<div style="text-align:center;font-size:0.78rem;color:var(--sub);">Q.' + (result.qIdx+1) + ' 라운드 결과</div>',
      '<h3 style="text-align:center;font-size:1.2rem;font-weight:900;margin:4px 0 14px;">정답 공개</h3>',
      '<div style="background:rgba(59,130,246,0.12);border:1px solid var(--focus);border-radius:10px;padding:10px;text-align:center;font-weight:800;margin-bottom:16px;">',
      '정답: <span style="font-size:1.2rem;">' + result.correctAnswerText + '</span>',
      '</div>',
      '<div style="font-size:0.82rem;font-weight:800;color:var(--green);margin-bottom:6px;">정답자 (' + correct.length + '명)</div>',
      '<div style="display:flex;flex-direction:column;gap:5px;margin-bottom:14px;">',
      correct.length === 0
        ? '<div style="font-size:0.8rem;color:var(--muted);">없음</div>'
        : correct.map(function(p) {
            return '<div style="display:flex;justify-content:space-between;align-items:center;background:var(--input-bg);padding:7px 12px;border-radius:8px;border:1px solid var(--border);">' +
              '<span style="font-weight:800;font-size:0.88rem;">' + p.nickname + '</span>' +
              '<span class="chip chip-ok">+' + p.earnedScore + '점 (누적 ' + p.score + '점)</span>' +
              '</div>';
          }).join(""),
      '</div>',
      '<div style="font-size:0.82rem;font-weight:800;color:var(--red);margin-bottom:6px;">오답/미제출 (' + wrong.length + '명)</div>',
      '<div style="display:flex;flex-direction:column;gap:5px;">',
      wrong.length === 0
        ? '<div style="font-size:0.8rem;color:var(--muted);">없음</div>'
        : wrong.map(function(p) {
            return '<div style="display:flex;justify-content:space-between;align-items:center;background:var(--input-bg);padding:7px 12px;border-radius:8px;border:1px solid var(--border);">' +
              '<span style="font-weight:800;font-size:0.88rem;">' + p.nickname + '<span style="font-size:0.72rem;color:var(--muted);margin-left:6px;">"' + (p.userAnswer || '미제출') + '"</span></span>' +
              '<span class="chip chip-err">+0점</span>' +
              '</div>';
          }).join(""),
      '</div>',
      '<div style="text-align:center;font-size:0.78rem;color:var(--muted);margin-top:16px;">잠시 후 다음 문제로 이동합니다...</div>',
      '</div>'
    ].join("");
    appEl.appendChild(overlay);
  }

  // ── 결과 화면 ─────────────────────────────────────────────
  function renderResult() {
    var sorted = curRoom.players.slice().sort(function(a, b) {
      return b.score !== a.score ? b.score - a.score : (a.totalTime || 0) - (b.totalTime || 0);
    });
    var first = sorted[0] || { nickname: "-", score: 0 };
    var second = sorted[1] || null;
    var third = sorted[2] || null;

    var div = document.createElement("div");
    div.style.cssText = "display:flex;flex-direction:column;height:100%;padding:18px;overflow-y:auto;";
    div.innerHTML = [
      '<div style="text-align:center;margin-bottom:14px;">',
      '<h2 style="font-size:1.4rem;font-weight:900;">🏆 FINAL RESULT</h2>',
      '<p style="color:var(--sub);font-size:0.82rem;margin-top:4px;">10라운드 대전 결과</p>',
      '</div>',
      // 시상대
      '<div class="podium-wrap">',
      second ? '<div class="podium-slot r2"><div class="p-name">' + second.nickname + '</div><div class="p-score">' + second.score + '점</div><div class="podium-box">2</div></div>' : '<div class="podium-slot r2"></div>',
      '<div class="podium-slot r1"><div style="font-size:0.7rem;font-weight:900;color:var(--gold);">CHAMPION</div><div class="p-name" style="font-size:1rem;">' + first.nickname + '</div><div class="p-score" style="color:var(--gold);">' + first.score + '점</div><div class="podium-box">1</div></div>',
      third ? '<div class="podium-slot r3"><div class="p-name">' + third.nickname + '</div><div class="p-score">' + third.score + '점</div><div class="podium-box">3</div></div>' : '<div class="podium-slot r3"></div>',
      '</div>',
      // 전체 순위
      '<div class="card" style="margin-bottom:16px;">',
      '<div style="font-weight:700;font-size:0.82rem;color:var(--sub);margin-bottom:10px;">종합 순위</div>',
      '<div style="display:flex;flex-direction:column;gap:7px;">',
      sorted.map(function(p, i) {
        return '<div style="display:flex;justify-content:space-between;align-items:center;background:var(--input-bg);padding:10px 14px;border-radius:10px;border:1px solid var(--border);">' +
          '<div style="display:flex;align-items:center;gap:10px;">' +
          '<span style="font-weight:900;font-size:0.95rem;width:30px;color:' + (i===0?'var(--gold)':'var(--text)') + '">' + (i+1) + '위</span>' +
          '<span style="font-weight:800;font-size:0.9rem;">' + p.nickname + '</span>' +
          '</div>' +
          '<span style="font-weight:900;font-size:1rem;color:var(--focus);">' + p.score + ' 점</span>' +
          '</div>';
      }).join(""),
      '</div></div>',
      '<button id="lobby-btn" style="width:100%;">로비로 돌아가기</button>'
    ].join("");
    appEl.appendChild(div);

    document.getElementById("lobby-btn").addEventListener("click", function() {
      leaveRoom(curRoomId, MY_ID);
      curRoomId = null; curRoom = null; appState = "LOBBY"; render();
    });
  }

  // ── 네트워크 메시지 수신 ─────────────────────────────────
  function onMessage(msg) {
    var type = msg.type;
    var payload = msg.payload || {};

    if (type === "REQ_ROOM_LIST") {
      var list = getRooms();
      if (list.length > 0) send("ROOM_LIST_UPDATE", { rooms: list });
    }
    else if (type === "ROOM_LIST_UPDATE") {
      setRooms(payload.rooms);
      if (appState === "LOBBY") render();
    }
    else if (type === "ROOM_STATE_UPDATE") {
      if (payload.room) {
        upsertRoom(payload.room);
        if (curRoomId && payload.room.id === curRoomId) {
          curRoom = payload.room;
          if (appState === "WAITING") render();
        }
      }
    }
    else if (type === "GAME_STARTED") {
      if (curRoomId && payload.roomId === curRoomId) {
        if (payload.room) { curRoom = payload.room; upsertRoom(curRoom); }
        if (payload.quizSet) curRoom.quizSet = payload.quizSet;
        curRoom.startTime = payload.startTime || Date.now();
        upsertRoom(curRoom);
        beginRound(0, curRoom.startTime);
      }
    }
    else if (type === "SUBMITTED_ANSWER") {
      if (curRoomId && payload.roomId === curRoomId && payload.sub) {
        if (!curRoom.subs) curRoom.subs = {};
        if (!curRoom.subs[payload.qIdx]) curRoom.subs[payload.qIdx] = {};
        curRoom.subs[payload.qIdx][payload.sub.playerId] = payload.sub;
        upsertRoom(curRoom);
        if (isHost()) checkAllSubmitted();
        if (appState === "QUIZ") render();
      }
    }
    else if (type === "ROUND_RESULT") {
      if (curRoomId && payload.roomId === curRoomId) handleRoundResult(payload.result);
    }
    else if (type === "NEXT_ROUND") {
      if (curRoomId && payload.roomId === curRoomId && !isHost()) {
        if (payload.startTime && curRoom) curRoom.startTime = payload.startTime;
        beginRound(payload.qIdx, payload.startTime);
      }
    }
    else if (type === "GAME_OVER") {
      if (curRoomId && payload.roomId === curRoomId) { appState = "RESULT"; render(); }
    }
    else if (type === "ROOM_DISBANDED") {
      if (curRoomId && payload.roomId === curRoomId) {
        alert("방장이 방을 나가 로비로 이동합니다.");
        curRoomId = null; curRoom = null; appState = "LOBBY"; render();
      }
    }
  }

  // ── 시작 ─────────────────────────────────────────────────
  initNet(onMessage);
  render();

})();
</script>
</body>
</html>
