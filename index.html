<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>상식퀴즈대전 - 실시간 멀티플레이</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f172a; --card: #1e293b; --border: #334155;
      --focus: #3b82f6; --input-bg: #0f172a;
      --text: #ffffff; --sub: #94a3b8; --muted: #64748b;
      --blue: #2563eb; --gold: #f59e0b; --red: #ef4444; --green: #10b981;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Noto Sans KR', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; justify-content: center; align-items: center; }
    #app { width: 100%; max-width: 440px; min-height: 100vh; display: flex; flex-direction: column; background: var(--bg); position: relative; }
    @media (min-width: 480px) { #app { min-height: 820px; height: 820px; border-radius: 20px; border: 1px solid var(--border); margin: 20px 0; overflow: hidden; box-shadow: 0 25px 60px -10px #000a; } }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; padding: 18px; width: 100%; }
    input, select { width: 100%; height: 48px; padding: 0 14px; background: var(--input-bg); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-size: 0.95rem; font-family: inherit; outline: none; }
    input:focus, select:focus { border-color: var(--focus); }
    button { height: 48px; padding: 0 18px; border-radius: 10px; border: none; font-size: 0.9rem; font-weight: 700; font-family: inherit; cursor: pointer; color: #fff; background: var(--blue); transition: opacity 0.15s; }
    button:hover { opacity: 0.85; }
    button:disabled { opacity: 0.35; cursor: not-allowed; }
    .btn-gold { background: var(--gold); color: #000; }
    .btn-red { background: var(--red); }
    .btn-sub { background: var(--border); color: var(--text); }
    .avatar { width: 38px; height: 38px; border-radius: 50%; background: linear-gradient(135deg, #3b82f6, #1d4ed8); color: #fff; font-weight: 900; font-size: 1rem; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .chip { padding: 3px 9px; border-radius: 7px; font-size: 0.72rem; font-weight: 800; display: inline-flex; align-items: center; }
    .chip-host { background:#f59e0b22; color:var(--gold); border:1px solid #f59e0b55; }
    .chip-ready { background:#10b98122; color:var(--green); border:1px solid #10b98155; }
    .chip-wait { background:#ef444422; color:var(--red); border:1px solid #ef444455; }
    .chip-ok { background:#10b98122; color:var(--green); border:1px solid #10b98155; }
    .chip-err { background:#ef444422; color:var(--red); border:1px solid #ef444455; }
    .timer-wrap { width:100%; height:7px; background:#fff2; border-radius:4px; overflow:hidden; margin:12px 0; }
    .timer-fill { height:100%; background:var(--focus); transition:width 0.1s linear, background 0.2s; }
    .timer-fill.warn { background:var(--red); }
    .q-box { background:var(--card); border:1px solid var(--border); border-radius:14px; padding:28px 18px; text-align:center; font-size:1.1rem; font-weight:700; line-height:1.6; min-height:140px; display:flex; align-items:center; justify-content:center; margin-bottom:14px; }
    .bottom-bar { margin-top:auto; padding:14px 18px; background:var(--bg); border-top:1px solid var(--border); }
    .overlay { position:absolute; top:0; left:0; width:100%; height:100%; background:#0f172aee; backdrop-filter:blur(8px); display:flex; align-items:center; justify-content:center; padding:20px; z-index:100; }
    .overlay-box { background:var(--card); border:1px solid var(--border); border-radius:16px; width:100%; padding:22px; }
    .podium-wrap { display:flex; justify-content:center; align-items:flex-end; gap:12px; height:210px; margin:14px 0 20px; }
    .podium-slot { display:flex; flex-direction:column; align-items:center; flex:1; height:100%; justify-content:flex-end; }
    .podium-box { width:100%; border-radius:10px 10px 0 0; display:flex; align-items:center; justify-content:center; font-weight:900; font-size:1.4rem; }
    .podium-slot.r1 .podium-box { height:125px; background:linear-gradient(180deg,#f59e0b,#d97706); color:#000; }
    .podium-slot.r2 .podium-box { height:88px; background:linear-gradient(180deg,#94a3b8,#475569); color:#fff; }
    .podium-slot.r3 .podium-box { height:62px; background:linear-gradient(180deg,#b45309,#78350f); color:#fff; }
    .p-name { font-size:0.85rem; font-weight:800; text-align:center; margin-bottom:2px; }
    .p-score { font-size:0.78rem; color:var(--sub); margin-bottom:6px; }

    /* 연결 상태 표시 */
    #net-badge {
      position: fixed; bottom: 14px; right: 14px;
      padding: 4px 10px; border-radius: 8px; font-size: 0.72rem; font-weight: 800;
      background: #ef444422; color: var(--red); border: 1px solid #ef444455;
      z-index: 999; transition: all 0.3s;
    }
    #net-badge.ok { background: #10b98122; color: var(--green); border-color: #10b98155; }
  </style>
</head>
<body>
<div id="app"></div>
<div id="net-badge">● 연결 중...</div>

<script>
(function() {
  "use strict";

  // ── 식별자 ────────────────────────────────────────────────
  if (!window.name || !window.name.startsWith("tq_"))
    window.name = "tq_" + Math.random().toString(36).substr(2, 8) + "_" + Date.now();
  var MY_ID = "p_" + window.name;

  // PieSocket 무료 채널 (채널명을 고정, 모든 클라이언트가 같은 채널 공유)
  var WS_URL = "wss://free.piesocket.com/v3/quiz_battle_2025_v1?api_key=VCXScKGBs8mMVQqEizqDYrKPvdM82fQQFiGAKebn&notify_self=1";

  // ── 네트워크 ──────────────────────────────────────────────
  var msgHandlers = new Set();
  var ws = null;
  var bc = null;
  var pingTimer = null;
  var roomBcastTimer = null;   // ★ 방 목록 주기적 브로드캐스트
  var reqRetryTimer = null;    // ★ REQ_ROOM_LIST 재시도
  var netBadge = document.getElementById("net-badge");

  function initNet(handler) {
    if (handler) msgHandlers.add(handler);
    // BroadcastChannel: 같은 브라우저 여러 탭 동기화용
    if (!bc && typeof BroadcastChannel !== "undefined") {
      try {
        bc = new BroadcastChannel("TQ_BC_2025");
        bc.onmessage = function(e) { if (e && e.data) onMsg(e.data); };
      } catch(err) {}
    }
    connectWS();
    return function() { if (handler) msgHandlers.delete(handler); };
  }

  function connectWS() {
    try {
      if (ws) { try { ws.close(); } catch(e) {} }
      ws = new WebSocket(WS_URL);
      ws.onopen = function() {
        setNetStatus(true);
        // 핑 유지
        if (pingTimer) clearInterval(pingTimer);
        pingTimer = setInterval(function() {
          if (ws && ws.readyState === 1) ws.send(JSON.stringify({ type: "PING", sid: MY_ID }));
        }, 8000);
        // ★ 접속 즉시 방 목록 요청, 그리고 재시도 2회
        send("REQ_ROOM_LIST", {});
        var retries = 0;
        if (reqRetryTimer) clearInterval(reqRetryTimer);
        reqRetryTimer = setInterval(function() {
          retries++;
          send("REQ_ROOM_LIST", {});
          if (retries >= 3) { clearInterval(reqRetryTimer); reqRetryTimer = null; }
        }, 1500);
      };
      ws.onmessage = function(e) {
        try {
          var msg = JSON.parse(e.data);
          if (msg && msg.type && msg.type !== "PING") onMsg(msg);
        } catch(err) {}
      };
      ws.onclose = function() {
        setNetStatus(false);
        if (pingTimer) clearInterval(pingTimer);
        setTimeout(connectWS, 2500);
      };
      ws.onerror = function() { setNetStatus(false); };
    } catch(err) { setNetStatus(false); setTimeout(connectWS, 3000); }
  }

  function setNetStatus(ok) {
    if (netBadge) {
      netBadge.textContent = ok ? "● 연결됨" : "● 연결 중...";
      netBadge.className = ok ? "ok" : "";
    }
  }

  // ★ 방 목록 주기 브로드캐스트 시작/중지
  function startRoomBcast() {
    if (roomBcastTimer) return;
    roomBcastTimer = setInterval(function() {
      var list = getRooms();
      if (list.length > 0) {
        send("ROOM_LIST_UPDATE", { rooms: list });
      }
    }, 4000); // 4초마다 방 목록 전송
  }
  function stopRoomBcast() {
    if (roomBcastTimer) { clearInterval(roomBcastTimer); roomBcastTimer = null; }
  }

  function send(type, payload) {
    var msg = { type: type, payload: payload || {}, sid: MY_ID, ts: Date.now() };
    // BroadcastChannel (같은 브라우저 내 탭)
    if (bc) { try { bc.postMessage(msg); } catch(err) {} }
    // WebSocket (다른 브라우저/기기)
    if (ws && ws.readyState === 1) {
      try { ws.send(JSON.stringify(msg)); } catch(err) {}
    }
  }

  function onMsg(msg) {
    msgHandlers.forEach(function(h) { try { h(msg); } catch(err) {} });
  }

  // ── 방 상태 (인메모리 Map) ────────────────────────────────
  var rooms = new Map();

  function getRooms() {
    return Array.from(rooms.values()).filter(function(r) {
      return r && Array.isArray(r.players) && r.players.length > 0;
    });
  }
  function setRooms(list) {
    rooms.clear();
    if (!Array.isArray(list)) return;
    list.forEach(function(r) {
      if (r && r.id && Array.isArray(r.players) && r.players.length > 0)
        rooms.set(r.id, r);
    });
  }
  function upsertRoom(r) {
    if (!r || !r.id) return;
    if (!r.players || r.players.length === 0) rooms.delete(r.id);
    else rooms.set(r.id, r);
  }

  function createRoom(opts) {
    // 기존에 내가 있던 방 정리
    rooms.forEach(function(r, id) {
      r.players = r.players.filter(function(p) { return p.id !== MY_ID; });
      if (r.players.length === 0) rooms.delete(id);
    });
    var room = {
      id: "rm_" + Math.random().toString(36).substr(2, 7),
      title: opts.title || opts.hostNickname + "님의 방",
      category: opts.category || "all",
      maxPlayers: Number(opts.maxPlayers) || 4,
      hostId: MY_ID,
      status: "waiting",
      players: [{
        id: MY_ID, nickname: opts.hostNickname,
        avatar: opts.hostNickname[0].toUpperCase(),
        isHost: true, isReady: true, score: 0, totalTime: 0
      }],
      quizSet: [], qIdx: 0, startTime: 0, subs: {}
    };
    rooms.set(room.id, room);
    // ★ 방 만들자마자 즉시 + 주기적으로 브로드캐스트
    send("ROOM_LIST_UPDATE", { rooms: getRooms() });
    startRoomBcast();
    return room;
  }

  function joinRoom(roomId, player) {
    var room = rooms.get(roomId);
    if (!room) return null;
    if (!room.players.find(function(p) { return p.id === player.id; })) {
      if (room.players.length >= room.maxPlayers) { alert("방이 가득 찼습니다."); return null; }
      room.players.push({
        id: player.id, nickname: player.nickname,
        avatar: player.nickname[0].toUpperCase(),
        isHost: false, isReady: false, score: 0, totalTime: 0
      });
    }
    rooms.set(room.id, room);
    send("ROOM_STATE_UPDATE", { room: room });
    send("ROOM_LIST_UPDATE", { rooms: getRooms() });
    return room;
  }

  function toggleReady(roomId, playerId) {
    var room = rooms.get(roomId);
    if (!room) return;
    var p = room.players.find(function(p) { return p.id === playerId; });
    if (p && !p.isHost) {
      p.isReady = !p.isReady;
      rooms.set(room.id, room);
      send("ROOM_STATE_UPDATE", { room: room });
    }
  }

  function leaveRoom(roomId, playerId) {
    var room = rooms.get(roomId);
    if (!room) return;
    var wasHost = room.hostId === playerId;
    room.players = room.players.filter(function(p) { return p.id !== playerId; });
    if (room.players.length === 0) {
      rooms.delete(roomId);
      stopRoomBcast();
    } else {
      if (wasHost) {
        room.players[0].isHost = true;
        room.players[0].isReady = true;
        room.hostId = room.players[0].id;
        send("HOST_CHANGED", { roomId: roomId, newHostId: room.hostId });
      }
      rooms.set(roomId, room);
    }
    send("ROOM_STATE_UPDATE", { room: room });
    send("ROOM_LIST_UPDATE", { rooms: getRooms() });
  }

  window.addEventListener("beforeunload", function() {
    if (curRoomId) leaveRoom(curRoomId, MY_ID);
  });

  // ── 퀴즈 DB ──────────────────────────────────────────────
  var QDB = [
    {id:"q01",sc:1,cat:"history",q:"조선시대 제4대 국왕이자 훈민정음을 창제한 왕은?",a:["세종대왕","세종"],hint:"만원권 지폐"},
    {id:"q02",sc:1,cat:"science",q:"원소 기호 Au에 해당하는 귀금속은?",a:["금","gold"],hint:"24k"},
    {id:"q03",sc:1,cat:"geography",q:"세계에서 면적이 가장 넓은 나라는?",a:["러시아","russia"],hint:"유라시아 북쪽"},
    {id:"q04",sc:1,cat:"science",q:"지구 대기 성분 중 약 78%를 차지하는 기체는?",a:["질소","nitrogen"],hint:"과자 봉지에 충전"},
    {id:"q05",sc:1,cat:"history",q:"1592년 이순신 장군이 한산도 대첩에서 쓴 진법은?",a:["학익진","학익진법"],hint:"학이 날개를 펼친 모양"},
    {id:"q06",sc:1,cat:"sports",q:"올림픽 오륜기 5개 고리가 상징하는 것은?",a:["5대륙","오대륙"],hint:"세계의 대륙들"},
    {id:"q07",sc:1,cat:"culture",q:"판도라 상자 맨 밑에 마지막으로 남은 것은?",a:["희망","hope"],hint:"그리스 신화"},
    {id:"q08",sc:1,cat:"science",q:"물질의 고체, 기체가 아닌 세 번째 기본 상태는?",a:["액체","liquid"],hint:"물과 같은 상태"},
    {id:"q09",sc:1,cat:"geography",q:"아프리카를 관류하는 세계에서 가장 긴 강은?",a:["나일강","나일 강","nile"],hint:"이집트 문명"},
    {id:"q10",sc:1,cat:"economy",q:"물가가 지속적으로 상승하는 경제 현상은?",a:["인플레이션","inflation"],hint:"디플레이션 반대"},
    {id:"q11",sc:1,cat:"history",q:"신라 청소년 수련단체로 세속오계를 지킨 조직은?",a:["화랑도","화랑"],hint:"김유신이 속한 단체"},
    {id:"q12",sc:1,cat:"sports",q:"한 선수가 한 경기에 3골 이상 넣는 것은?",a:["해트트릭","햇트릭","hat trick"],hint:"모자 마술에서 유래"},
    {id:"q13",sc:1,cat:"science",q:"혈액 순환 펌프 역할을 하는 신체 기관은?",a:["심장","heart"],hint:"가슴 왼쪽"},
    {id:"q14",sc:1,cat:"culture",q:"셰익스피어 '사느냐 죽느냐'로 유명한 작품은?",a:["햄릿","hamlet"],hint:"덴마크 왕자"},

    {id:"q16",sc:1,cat:"geography",q:"남아메리카에서 면적이 가장 넓은 나라는?",a:["브라질","brazil"],hint:"삼바와 축구"},

    {id:"q30",sc:1,cat:"history",q:"발해를 건국한 고구려 장수 출신 인물은?",a:["대조영"],hint:"동모산 인근 건국"},
    {id:"q31",sc:1,cat:"geography",q:"호주의 행정 수도 도시는?",a:["캔버라","canberra"],hint:"시드니-멜버른 사이"},

    {id:"q35",sc:1,cat:"history",q:"강감찬이 거란 10만 대군을 대파한 전투는?",a:["귀주대첩","귀주 대첩"],hint:"고려 3대 대첩"},

  function normalize(s) {
    if (!s) return "";
    return String(s).toLowerCase().trim()
      .replace(/\s+/g, "").replace(/[.,!?]/g, "")
      .replace(/킬로미터/g, "km").replace(/개$/, "").replace(/점$/, "");
  }

  function checkAnswer(userAns, correctList) {
    if (!userAns || !Array.isArray(correctList)) return false;
    var u = normalize(userAns);
    if (!u) return false;
    return correctList.some(function(a) {
      var c = normalize(a);
      if (c === u) return true;
      var un = u.replace(/[^0-9.]/g, ""), cn = c.replace(/[^0-9.]/g, "");
      return un && cn && un === cn;
    });
  }

  function shuffle(arr) {
    var a = arr.slice();
    for (var i = a.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
    }
    return a;
  }

  function buildQuizSet(category) {
    var ones = QDB.filter(function(q) { return q.sc === 1; });
    var twos = QDB.filter(function(q) { return q.sc === 2; });
    if (category !== "all") {
      var f = ones.filter(function(q) { return q.cat === category; });
      if (f.length >= 9) ones = f;
    }
    return shuffle(ones).slice(0, 9).concat(shuffle(twos).slice(0, 1));
  }

  function catLabel(c) {
    return { all:"전체", history:"역사", science:"과학", sports:"스포츠", economy:"경제", culture:"문화", geography:"지리" }[c] || c;
  }

  function doJoin(roomId) {
    // 로컬 맵에 해당 방이 없으면 → REQ_ROOM_LIST 후 대기 (보통 이 경우는 없어야 함)
    var room = rooms.get(roomId);
    if (!room) { alert("방 정보를 가져올 수 없습니다. 잠시 후 다시 시도해 주세요."); return; }
    var joined = joinRoom(roomId, { id: MY_ID, nickname: profile.nickname });
    if (!joined) return;
    curRoomId = roomId;
    curRoom = joined;
    appState = "WAITING";
    render();
  }

  function startGame() {
    var quiz = buildQuizSet(curRoom.category);
    curRoom.quizSet = quiz;
    curRoom.status = "playing";
    curRoom.startTime = Date.now();
    curRoom.subs = {};
    upsertRoom(curRoom);
    stopRoomBcast();
    send("GAME_STARTED", { roomId: curRoomId, room: curRoom, quizSet: quiz, startTime: curRoom.startTime });
    beginRound(0, curRoom.startTime);
  }

  // ── 퀴즈 ─────────────────────────────────────────────────
  function beginRound(idx, startTs) {
    if (timerInterval) clearInterval(timerInterval);
    if (resultTimeout) clearTimeout(resultTimeout);
    qIdx = idx;
    submitted = false;
    submittedAns = "";
    roundOverlay = null;
    if (curRoom) { curRoom.qIdx = idx; curRoom.startTime = startTs; }
    var elapsed = Math.floor((Date.now() - startTs) / 1000);
    timeLeft = Math.max(0, 15 - elapsed);
    appState = "QUIZ";
    render();
    timerInterval = setInterval(function() {
      var e = Math.floor((Date.now() - (curRoom ? curRoom.startTime : startTs)) / 1000);
      timeLeft = Math.max(0, 15 - e);
      updateTimer();
      if (timeLeft <= 0) {
        clearInterval(timerInterval); timerInterval = null;
        timeLeft = 0; updateTimer();
        if (isHost()) evaluateRound();
      }
    }, 500);
  }

  function isHost() { return curRoom && curRoom.hostId === MY_ID; }

      '</div></div>',
      '<div style="padding:0 18px;flex:1;overflow-y:auto;">',
      '<div class="q-box">' + quiz.q + '</div>',
      '<div class="card" style="padding:10px 14px;margin-bottom:12px;">',
      '<div style="font-size:0.76rem;font-weight:700;color:var(--sub);margin-bottom:7px;">제출 현황</div>',
      '<div style="display:flex;flex-wrap:wrap;gap:5px;">',
      room.players.map(function(p) {
        var hasSub = room.subs && room.subs[qIdx] && room.subs[qIdx][p.id];
        return '<div style="display:flex;align-items:center;gap:4px;background:var(--input-bg);padding:3px 8px;border-radius:7px;font-size:0.76rem;border:1px solid var(--border);">' +
          '<span style="font-weight:800;">' + p.nickname + '</span>' +
          '<span class="chip ' + (hasSub ? 'chip-ok' : '') + '" style="font-size:0.66rem;padding:1px 5px;' + (!hasSub ? 'background:var(--border);color:var(--muted);' : '') + '">' +
          (hasSub ? '제출' : '대기') + '</span></div>';
      }).join(""),
      '</div></div></div>',
      '<div class="bottom-bar">',
      '<form id="ans-form" style="display:flex;gap:8px;">',
      '<input id="ans-in" type="text" placeholder="' + (submitted ? '제출 완료 ✓' : '정답 입력 후 엔터') + '" value="' + (submittedAns || '') + '" ' + (submitted || timeLeft <= 0 ? 'disabled' : '') + ' style="flex:1;">',
      '<button type="submit" class="' + (isGolden ? 'btn-gold' : '') + '" style="width:78px;" ' + (submitted || timeLeft <= 0 ? 'disabled' : '') + '>' + (submitted ? '완료' : '제출') + '</button>',
      '</form></div>'
    ].join("");
    appEl.appendChild(div);

    var form = document.getElementById("ans-form");
    if (form) form.addEventListener("submit", function(e) {
      e.preventDefault();
      var ans = document.getElementById("ans-in").value.trim();
      if (!ans) { alert("답안을 입력해 주세요."); return; }
      submitAnswer(ans);
    });
    if (roundOverlay) showRoundOverlay(roundOverlay);
  }

  function updateTimer() {
    var bar = document.getElementById("t-bar");
    var txt = document.getElementById("t-text");
    if (!bar || !txt) return;
    bar.style.width = (timeLeft / 15 * 100) + "%";
    var warn = timeLeft <= 4;
    bar.className = "timer-fill" + (warn ? " warn" : "");
    txt.textContent = timeLeft + "초";
    txt.style.color = warn ? "var(--red)" : "var(--focus)";
  }

  function submitAnswer(ans) {
    if (submitted) return;
    submitted = true; submittedAns = ans;
    var quiz = curRoom.quizSet[qIdx];
    var correct = checkAnswer(ans, quiz.a);
    var sub = {
      playerId: MY_ID, nickname: profile.nickname,
      answer: ans, isCorrect: correct,
      score: correct ? quiz.sc : 0,
      timeTaken: Date.now() - curRoom.startTime
    };
    if (!curRoom.subs) curRoom.subs = {};
    if (!curRoom.subs[qIdx]) curRoom.subs[qIdx] = {};
    curRoom.subs[qIdx][MY_ID] = sub;
    upsertRoom(curRoom);
    send("SUBMITTED_ANSWER", { roomId: curRoomId, qIdx: qIdx, sub: sub });
    if (isHost()) checkAllSubmitted();
    render();
  }

  function checkAllSubmitted() {
    if (!isHost() || !curRoom) return;
    var subs = (curRoom.subs && curRoom.subs[qIdx]) || {};
    if (Object.keys(subs).length >= curRoom.players.length) {
      if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
      evaluateRound();
    }
  }

  function evaluateRound() {
    if (!isHost() || !curRoom) return;
    var quiz = curRoom.quizSet[qIdx];
    var subs = (curRoom.subs && curRoom.subs[qIdx]) || {};
    var results = curRoom.players.map(function(p) {
      var s = subs[p.id];
      var correct = s ? s.isCorrect : false;
      var earned = correct ? quiz.sc : 0;
      p.score = (p.score || 0) + earned;
      p.totalTime = (p.totalTime || 0) + (s ? s.timeTaken : 15000);
      return { id: p.id, nickname: p.nickname, isCorrect: correct, earnedScore: earned, score: p.score, userAnswer: s ? s.answer : "" };
    });
    upsertRoom(curRoom);
    var result = { qIdx: qIdx, correctAnswerText: quiz.a[0], players: results, room: curRoom };
    send("ROUND_RESULT", { roomId: curRoomId, result: result });
    handleRoundResult(result);
  }

  function handleRoundResult(result) {
    if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
    roundOverlay = result;
    if (result.room) { curRoom = result.room; upsertRoom(curRoom); }
    render();
    if (resultTimeout) clearTimeout(resultTimeout);
    resultTimeout = setTimeout(function() {
      roundOverlay = null;
      if (isHost()) {
        var next = qIdx + 1;
        if (curRoom && next < curRoom.quizSet.length) {
          curRoom.startTime = Date.now();
          upsertRoom(curRoom);
          send("NEXT_ROUND", { roomId: curRoomId, qIdx: next, startTime: curRoom.startTime });
          beginRound(next, curRoom.startTime);
        } else {
          send("GAME_OVER", { roomId: curRoomId });
          appState = "RESULT"; render();
        }
      }
    }, 3500);
  }

  function showRoundOverlay(result) {
    var overlay = mk("div", "");
    overlay.className = "overlay";
    var correct = result.players.filter(function(p) { return p.isCorrect; });
    var wrong = result.players.filter(function(p) { return !p.isCorrect; });
    overlay.innerHTML = [
      '<div class="overlay-box">',
      '<div style="text-align:center;font-size:0.76rem;color:var(--sub);">Q.' + (result.qIdx+1) + ' 라운드 결과</div>',
      '<h3 style="text-align:center;font-size:1.15rem;font-weight:900;margin:4px 0 14px;">정답 공개</h3>',
      '<div style="background:rgba(59,130,246,0.12);border:1px solid var(--focus);border-radius:10px;padding:10px;text-align:center;font-weight:800;margin-bottom:14px;">',
      '정답: <span style="font-size:1.15rem;">' + result.correctAnswerText + '</span>',
      '</div>',
      '<div style="font-size:0.8rem;font-weight:800;color:var(--green);margin-bottom:6px;">✓ 정답자 (' + correct.length + '명)</div>',
      '<div style="display:flex;flex-direction:column;gap:5px;margin-bottom:12px;">',
      (correct.length === 0 ? '<div style="font-size:0.78rem;color:var(--muted);">없음</div>' :
        correct.map(function(p) {
          return '<div style="display:flex;justify-content:space-between;align-items:center;background:var(--input-bg);padding:7px 12px;border-radius:8px;border:1px solid var(--border);">' +
            '<span style="font-weight:800;font-size:0.88rem;">' + p.nickname + '</span>' +
            '<span class="chip chip-ok">+' + p.earnedScore + '점 (' + p.score + '점)</span></div>';
        }).join("")),
      '</div>',
      '<div style="font-size:0.8rem;font-weight:800;color:var(--red);margin-bottom:6px;">✗ 오답/미제출 (' + wrong.length + '명)</div>',
      '<div style="display:flex;flex-direction:column;gap:5px;">',
      (wrong.length === 0 ? '<div style="font-size:0.78rem;color:var(--muted);">없음</div>' :
        wrong.map(function(p) {
          return '<div style="display:flex;justify-content:space-between;align-items:center;background:var(--input-bg);padding:7px 12px;border-radius:8px;border:1px solid var(--border);">' +
            '<span style="font-weight:800;font-size:0.88rem;">' + p.nickname + ' <span style="font-size:0.7rem;color:var(--muted);">"' + (p.userAnswer || '미제출') + '"</span></span>' +
            '<span class="chip chip-err">+0점</span></div>';
        }).join("")),
      '</div>',
      '<div style="text-align:center;font-size:0.76rem;color:var(--muted);margin-top:14px;">잠시 후 다음 문제로 이동...</div>',
      '</div>'
    ].join("");
    appEl.appendChild(overlay);
  }

  // ── 결과 화면 ─────────────────────────────────────────────
  function renderResult() {
    var sorted = curRoom.players.slice().sort(function(a, b) {
      return b.score !== a.score ? b.score - a.score : (a.totalTime || 0) - (b.totalTime || 0);
    });
    var div = mk("div", "display:flex;flex-direction:column;height:100%;padding:18px;overflow-y:auto;");
    var p1 = sorted[0] || { nickname: "-", score: 0 };
    var p2 = sorted[1] || null;
    var p3 = sorted[2] || null;
    div.innerHTML = [
      '<div style="text-align:center;margin-bottom:12px;">',
      '<div style="font-size:1.8rem;margin-bottom:4px;">🏆</div>',
      '<h2 style="font-size:1.3rem;font-weight:900;">FINAL RESULT</h2>',
      '<p style="color:var(--sub);font-size:0.8rem;margin-top:4px;">10라운드 대전 종료</p>',
      '</div>',
      '<div class="podium-wrap">',
      (p2 ? '<div class="podium-slot r2"><div class="p-name">' + p2.nickname + '</div><div class="p-score">' + p2.score + '점</div><div class="podium-box">2</div></div>' : '<div class="podium-slot r2"></div>'),
      '<div class="podium-slot r1"><div style="font-size:0.68rem;font-weight:900;color:var(--gold);margin-bottom:2px;">CHAMPION</div><div class="p-name" style="font-size:0.95rem;">' + p1.nickname + '</div><div class="p-score" style="color:var(--gold);">' + p1.score + '점</div><div class="podium-box">1</div></div>',
      (p3 ? '<div class="podium-slot r3"><div class="p-name">' + p3.nickname + '</div><div class="p-score">' + p3.score + '점</div><div class="podium-box">3</div></div>' : '<div class="podium-slot r3"></div>'),
      '</div>',
      '<div class="card" style="margin-bottom:14px;">',
      '<div style="font-weight:700;font-size:0.8rem;color:var(--sub);margin-bottom:10px;">종합 순위</div>',
      sorted.map(function(p, i) {
        return '<div style="display:flex;justify-content:space-between;align-items:center;background:var(--input-bg);padding:10px 14px;border-radius:10px;border:1px solid var(--border);margin-bottom:' + (i < sorted.length-1 ? '7' : '0') + 'px;">' +
          '<div style="display:flex;align-items:center;gap:10px;">' +
          '<span style="font-weight:900;font-size:0.95rem;width:28px;color:' + (i===0?'var(--gold)':'var(--text)') + '">' + (i+1) + '위</span>' +
          '<span style="font-weight:800;font-size:0.9rem;">' + p.nickname + '</span>' +
          '</div>' +
          '<span style="font-weight:900;font-size:1rem;color:var(--focus);">' + p.score + '점</span></div>';
      }).join(""),
      '</div>',
      '<button id="lobby-btn" style="width:100%;">로비로 돌아가기</button>'
    ].join("");
    appEl.appendChild(div);
    document.getElementById("lobby-btn").addEventListener("click", function() {
      leaveRoom(curRoomId, MY_ID);
      curRoomId = null; curRoom = null; appState = "LOBBY"; render();
    });
  }

  // ── 메시지 핸들러 ─────────────────────────────────────────
  function handleMessage(msg) {
    var type = msg.type;
    var p = msg.payload || {};

    if (type === "REQ_ROOM_LIST") {
      // ★ 다른 클라이언트가 방 목록 요청 → 내가 가진 방이 있으면 즉시 응답
      var list = getRooms();
      if (list.length > 0) send("ROOM_LIST_UPDATE", { rooms: list });
    }
    else if (type === "ROOM_LIST_UPDATE") {
      if (!Array.isArray(p.rooms)) return;
      // 머지: 내가 없는 방만 받아오기
      p.rooms.forEach(function(r) {
        if (!r || !r.id) return;
        // 내가 호스트인 방은 덮어쓰지 않음
        var existing = rooms.get(r.id);
        if (existing && existing.hostId === MY_ID) return;
        if (r.players && r.players.length > 0) rooms.set(r.id, r);
        else rooms.delete(r.id);
      });
      if (appState === "LOBBY") render();
    }
    else if (type === "ROOM_STATE_UPDATE") {
      if (!p.room) return;
      var r = p.room;
      // 내가 호스트인 방은 덮어쓰지 않음
      if (r.hostId !== MY_ID) upsertRoom(r);
      if (curRoomId && r.id === curRoomId) {
        curRoom = rooms.get(curRoomId) || r;
        if (appState === "WAITING") render();
      }
    }
    else if (type === "GAME_STARTED") {
      if (!curRoomId || p.roomId !== curRoomId) return;
      if (p.room) { curRoom = p.room; upsertRoom(curRoom); }
      if (p.quizSet) curRoom.quizSet = p.quizSet;
      curRoom.startTime = p.startTime || Date.now();
      upsertRoom(curRoom);
      beginRound(0, curRoom.startTime);
    }
    else if (type === "SUBMITTED_ANSWER") {
      if (!curRoomId || p.roomId !== curRoomId || !p.sub) return;
      if (!curRoom.subs) curRoom.subs = {};
      if (!curRoom.subs[p.qIdx]) curRoom.subs[p.qIdx] = {};
      curRoom.subs[p.qIdx][p.sub.playerId] = p.sub;
      upsertRoom(curRoom);
      if (isHost()) checkAllSubmitted();
      if (appState === "QUIZ") render();
    }
    else if (type === "ROUND_RESULT") {
      if (!curRoomId || p.roomId !== curRoomId) return;
      if (!isHost()) handleRoundResult(p.result);
    }
    else if (type === "NEXT_ROUND") {
      if (!curRoomId || p.roomId !== curRoomId || isHost()) return;
      if (p.startTime && curRoom) curRoom.startTime = p.startTime;
      beginRound(p.qIdx, p.startTime);
    }
    else if (type === "GAME_OVER") {
      if (!curRoomId || p.roomId !== curRoomId) return;
      appState = "RESULT"; render();
    }
    else if (type === "HOST_CHANGED") {
      if (!curRoomId || p.roomId !== curRoomId) return;
      if (p.newHostId === MY_ID) {
        // 내가 새 호스트가 됨
        if (curRoom) curRoom.hostId = MY_ID;
        startRoomBcast();
      }
    }
  }

  // ── 유틸 ─────────────────────────────────────────────────
  function mk(tag, style) {
    var el = document.createElement(tag);
    if (style) el.style.cssText = style;
    return el;
  }

  // ── 시작 ─────────────────────────────────────────────────
  initNet(handleMessage);
  render();

})();
</script>
</body>
</html>
