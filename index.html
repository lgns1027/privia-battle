<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>상식퀴즈대전 - 실시간 멀티플레이</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/mqtt@5.3.4/dist/mqtt.min.js"></script>
  <style>
    :root{
      --bg:#0f172a;--card:#1e293b;--border:#334155;
      --focus:#3b82f6;--inp:#0f172a;
      --txt:#fff;--sub:#94a3b8;--muted:#64748b;
      --blue:#2563eb;--gold:#f59e0b;--red:#ef4444;--green:#10b981;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;display:flex;justify-content:center;align-items:center}
    #app{width:100%;max-width:440px;min-height:100vh;display:flex;flex-direction:column;background:var(--bg);position:relative}
    @media(min-width:480px){#app{min-height:820px;height:820px;border-radius:20px;border:1px solid var(--border);margin:20px 0;overflow:hidden;box-shadow:0 25px 60px -10px #000a}}
    .card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px;width:100%}
    input,select{width:100%;height:48px;padding:0 14px;background:var(--inp);border:1px solid var(--border);border-radius:10px;color:var(--txt);font-size:.95rem;font-family:inherit;outline:none}
    input:focus,select:focus{border-color:var(--focus)}
    button{height:48px;padding:0 18px;border-radius:10px;border:none;font-size:.9rem;font-weight:700;font-family:inherit;cursor:pointer;color:#fff;background:var(--blue);transition:opacity .15s}
    button:hover{opacity:.85}
    button:disabled{opacity:.35;cursor:not-allowed}
    .btn-gold{background:var(--gold);color:#000}
    .btn-red{background:var(--red)}
    .btn-sub{background:var(--border);color:var(--txt)}
    .avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#3b82f6,#1d4ed8);color:#fff;font-weight:900;font-size:.9rem;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .chip{padding:3px 9px;border-radius:7px;font-size:.72rem;font-weight:800;display:inline-flex;align-items:center}
    .chip-host{background:#f59e0b22;color:var(--gold);border:1px solid #f59e0b55}
    .chip-ready{background:#10b98122;color:var(--green);border:1px solid #10b98155}
    .chip-wait{background:#ef444422;color:var(--red);border:1px solid #ef444455}
    .chip-ok{background:#10b98122;color:var(--green);border:1px solid #10b98155}
    .chip-err{background:#ef444422;color:var(--red);border:1px solid #ef444455}
    .timer-wrap{width:100%;height:7px;background:#fff2;border-radius:4px;overflow:hidden;margin:8px 0}
    .timer-fill{height:100%;background:var(--focus);transition:width .1s linear,background .2s}
    .timer-fill.warn{background:var(--red)}
    .q-box{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:22px 18px;text-align:center;font-size:1.05rem;font-weight:700;line-height:1.6;min-height:120px;display:flex;align-items:center;justify-content:center;margin-bottom:10px}
    .bottom-bar{padding:10px 18px;background:var(--bg);border-top:1px solid var(--border)}
    .overlay{position:absolute;top:0;left:0;width:100%;height:100%;background:#0f172af0;backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;padding:16px;z-index:100;overflow-y:auto}
    .overlay-box{background:var(--card);border:1px solid var(--border);border-radius:16px;width:100%;padding:20px}
    .podium-wrap{display:flex;justify-content:center;align-items:flex-end;gap:10px;height:190px;margin:12px 0 18px}
    .podium-slot{display:flex;flex-direction:column;align-items:center;flex:1;height:100%;justify-content:flex-end}
    .podium-box{width:100%;border-radius:10px 10px 0 0;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:1.3rem}
    .podium-slot.r1 .podium-box{height:115px;background:linear-gradient(180deg,#f59e0b,#d97706);color:#000}
    .podium-slot.r2 .podium-box{height:80px;background:linear-gradient(180deg,#94a3b8,#475569);color:#fff}
    .podium-slot.r3 .podium-box{height:58px;background:linear-gradient(180deg,#b45309,#78350f);color:#fff}
    .p-name{font-size:.82rem;font-weight:800;text-align:center;margin-bottom:2px}
    .p-score{font-size:.75rem;color:var(--sub);margin-bottom:5px}
    #net-status{position:fixed;bottom:12px;right:12px;padding:4px 10px;border-radius:8px;font-size:.72rem;font-weight:800;z-index:999;transition:all .3s;background:#ef444422;color:var(--red);border:1px solid #ef444455}
    #net-status.ok{background:#10b98122;color:var(--green);border-color:#10b98155}
    #net-status.warn{background:#f59e0b22;color:var(--gold);border-color:#f59e0b55}

    /* 채팅 */
    .chat-wrap{display:flex;flex-direction:column;height:100%}
    .chat-msgs{flex:1;overflow-y:auto;padding:8px 0;display:flex;flex-direction:column;gap:4px}
    .chat-msg{padding:5px 10px;border-radius:10px;font-size:.8rem;background:var(--inp);border:1px solid var(--border);max-width:90%;word-break:break-all}
    .chat-msg.mine{align-self:flex-end;background:#1e3a5f;border-color:#2563eb55}
    .chat-msg .cn{font-weight:800;font-size:.72rem;color:var(--sub);margin-bottom:1px}
    .chat-msg .ct{color:var(--txt)}
    .chat-msg.sys{background:transparent;border:none;color:var(--muted);font-size:.74rem;text-align:center;align-self:center}

    /* 힌트 버튼 */
    .hint-btn{height:38px;padding:0 12px;font-size:.8rem;background:#7c3aed;border-radius:8px;border:none;color:#fff;font-family:inherit;font-weight:700;cursor:pointer;transition:opacity .15s;white-space:nowrap}
    .hint-btn:disabled{opacity:.35;cursor:not-allowed}
    .hint-box{background:#1e1040;border:1px solid #7c3aed55;border-radius:10px;padding:8px 12px;font-size:.82rem;color:#c4b5fd;margin-top:8px;font-weight:600}

    /* 탭 */
    .tab-bar{display:flex;border-bottom:1px solid var(--border)}
    .tab{flex:1;height:40px;display:flex;align-items:center;justify-content:center;font-size:.82rem;font-weight:700;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s}
    .tab.active{color:var(--focus);border-bottom-color:var(--focus)}

    /* 점수 플로팅 */
    @keyframes scoreFloat{from{opacity:1;transform:translateY(0)}to{opacity:0;transform:translateY(-40px)}}
    .score-float{position:fixed;font-size:1.2rem;font-weight:900;color:var(--green);pointer-events:none;animation:scoreFloat .9s ease-out forwards;z-index:9999}
  </style>
</head>
<body>
<div id="app"></div>
<div id="net-status">● 연결 중...</div>
<script>
(function(){
"use strict";

// ── 식별자 ──────────────────────────────────────────────
if(!window.name||!window.name.startsWith("tq_"))
  window.name="tq_"+Math.random().toString(36).substr(2,8)+"_"+Date.now();
var MY_ID="p_"+window.name;

// ── MQTT (HiveMQ 공개 브로커) ────────────────────────────
var BROKER="wss://broker.hivemq.com:8884/mqtt";
var TOPIC_ROOMS="tqbattle/v2/rooms";
var TOPIC_ROOM="tqbattle/v2/room/";
var TOPIC_CHAT="tqbattle/v2/chat/";

var mqttClient=null,mqttReady=false,subTopics=new Set(),msgQueue=[];
var netBadge=document.getElementById("net-status");

function initMQTT(onMsg){
  var cid="tqb_"+Math.random().toString(36).substr(2,10);
  mqttClient=mqtt.connect(BROKER,{clientId:cid,clean:true,keepalive:30,reconnectPeriod:2000,connectTimeout:10000});
  mqttClient.on("connect",function(){
    mqttReady=true;setNet("ok","● 연결됨");
    mqttSub(TOPIC_ROOMS);
    msgQueue.forEach(function(m){mqttPub(m.topic,m.payload,m.retain);});
    msgQueue=[];
  });
  mqttClient.on("reconnect",function(){setNet("warn","● 재연결 중...");});
  mqttClient.on("offline",function(){setNet("","● 오프라인");mqttReady=false;});
  mqttClient.on("error",function(){});
  mqttClient.on("message",function(topic,buf){
    try{
      var msg=JSON.parse(buf.toString());
      if(msg&&msg.sid!==MY_ID) onMsg(msg,topic);
    }catch(e){}
  });
}
function mqttSub(topic){
  if(subTopics.has(topic))return;subTopics.add(topic);
  if(mqttReady)mqttClient.subscribe(topic,{qos:1});
  else mqttClient.once("connect",function(){mqttClient.subscribe(topic,{qos:1});});
}
function mqttPub(topic,payload,retain){
  var buf=JSON.stringify(Object.assign({},payload,{sid:MY_ID,ts:Date.now()}));
  if(!mqttReady){msgQueue.push({topic:topic,payload:payload,retain:!!retain});return;}
  mqttClient.publish(topic,buf,{qos:1,retain:!!retain});
}
function setNet(cls,txt){netBadge.className=cls;netBadge.textContent=txt;}

// ── 방 상태 ─────────────────────────────────────────────
var rooms=new Map();
function getRooms(){return Array.from(rooms.values()).filter(function(r){return r&&Array.isArray(r.players)&&r.players.length>0;});}
function mergeRooms(list){
  if(!Array.isArray(list))return;
  list.forEach(function(r){
    if(!r||!r.id)return;
    var ex=rooms.get(r.id);
    if(ex&&ex.hostId===MY_ID)return;
    if(r.players&&r.players.length>0)rooms.set(r.id,r);
    else rooms.delete(r.id);
  });
}
function upsertRoom(r){if(!r||!r.id)return;if(!r.players||r.players.length===0)rooms.delete(r.id);else rooms.set(r.id,r);}
function publishRoomList(){mqttPub(TOPIC_ROOMS,{type:"ROOM_LIST_UPDATE",rooms:getRooms()},true);}
function subRoomTopic(id){mqttSub(TOPIC_ROOM+id);}
function pubRoom(id,type,payload){mqttPub(TOPIC_ROOM+id,Object.assign({type:type},payload),false);}

// ── 채팅 ────────────────────────────────────────────────
var chatMsgs=[]; // {id,nickname,text,mine,sys,ts}
function subChatTopic(id){mqttSub(TOPIC_CHAT+id);}
function pubChat(roomId,text){
  mqttPub(TOPIC_CHAT+roomId,{type:"CHAT",nickname:profile.nickname,text:text},false);
  // 내 메시지는 직접 추가 (MQTT는 self 제외)
  addChat({nickname:profile.nickname,text:text,mine:true});
}
function addChat(msg){
  chatMsgs.push(msg);
  if(chatMsgs.length>80)chatMsgs.shift();
  var box=document.getElementById("chat-msgs");
  if(box){appendChatMsg(box,msg);box.scrollTop=box.scrollHeight;}
}
function addSysMsg(text){addChat({text:text,sys:true});}
function appendChatMsg(box,msg){
  var d=document.createElement("div");
  if(msg.sys){d.className="chat-msg sys";d.textContent=msg.text;}
  else{
    d.className="chat-msg"+(msg.mine?" mine":"");
    d.innerHTML='<div class="cn">'+msg.nickname+'</div><div class="ct">'+escHtml(msg.text)+'</div>';
  }
  box.appendChild(d);
}
function escHtml(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}

// ── 방 CRUD ─────────────────────────────────────────────
function createRoom(opts){
  rooms.forEach(function(r,id){
    r.players=r.players.filter(function(p){return p.id!==MY_ID;});
    if(r.players.length===0)rooms.delete(id);
  });
  var room={
    id:"rm_"+Math.random().toString(36).substr(2,7),
    title:opts.title||opts.hostNickname+"님의 방",
    category:opts.category||"all",
    difficulty:opts.difficulty||"normal",
    maxPlayers:Number(opts.maxPlayers)||4,
    hostId:MY_ID,status:"waiting",
    players:[{id:MY_ID,nickname:opts.hostNickname,avatar:opts.hostNickname[0].toUpperCase(),isHost:true,isReady:true,score:0,totalTime:0}],
    quizSet:[],qIdx:0,startTime:0,subs:{}
  };
  rooms.set(room.id,room);
  subRoomTopic(room.id);subChatTopic(room.id);
  publishRoomList();
  return room;
}
function joinRoom(roomId,player){
  var room=rooms.get(roomId);if(!room)return null;
  if(!room.players.find(function(p){return p.id===player.id;})){
    if(room.players.length>=room.maxPlayers){alert("방이 가득 찼습니다.");return null;}
    room.players.push({id:player.id,nickname:player.nickname,avatar:player.nickname[0].toUpperCase(),isHost:false,isReady:false,score:0,totalTime:0});
  }
  rooms.set(room.id,room);
  subRoomTopic(room.id);subChatTopic(room.id);
  pubRoom(room.id,"ROOM_STATE_UPDATE",{room:room});
  publishRoomList();
  return room;
}
function toggleReady(roomId,playerId){
  var room=rooms.get(roomId);if(!room)return;
  var p=room.players.find(function(p){return p.id===playerId;});
  if(p&&!p.isHost){p.isReady=!p.isReady;rooms.set(room.id,room);pubRoom(room.id,"ROOM_STATE_UPDATE",{room:room});}
}
function leaveRoom(roomId,playerId){
  var room=rooms.get(roomId);if(!room)return;
  var wasHost=room.hostId===playerId;
  room.players=room.players.filter(function(p){return p.id!==playerId;});
  if(room.players.length===0){rooms.delete(roomId);mqttPub(TOPIC_ROOMS,{type:"ROOM_LIST_UPDATE",rooms:getRooms()},true);}
  else{
    if(wasHost){room.players[0].isHost=true;room.players[0].isReady=true;room.hostId=room.players[0].id;pubRoom(roomId,"HOST_CHANGED",{newHostId:room.hostId,room:room});}
    rooms.set(roomId,room);publishRoomList();pubRoom(roomId,"ROOM_STATE_UPDATE",{room:room});
  }
}
window.addEventListener("beforeunload",function(){if(curRoomId)leaveRoom(curRoomId,MY_ID);});

// ── 퀴즈 DB (어려운 문제로 교체) ─────────────────────────
var QDB={
  easy:[
    {id:"e01",q:"조선시대 제4대 국왕이자 훈민정음을 창제한 왕은?",a:["세종대왕","세종"]},
    {id:"e02",q:"원소 기호 Au에 해당하는 귀금속은?",a:["금","gold"]},
    {id:"e03",q:"세계에서 면적이 가장 넓은 나라는?",a:["러시아","russia"]},
    {id:"e04",q:"지구 대기 성분 중 약 78%를 차지하는 기체는?",a:["질소","nitrogen"]},
    {id:"e05",q:"빛의 삼원색 중 빨강, 파랑이 아닌 나머지 색은?",a:["초록","녹색","green"]},
    {id:"e06",q:"올림픽 오륜기 5개 고리가 상징하는 것은?",a:["5대륙","오대륙"]},
    {id:"e07",q:"1592년 이순신 장군이 한산도 대첩에서 사용한 진법은?",a:["학익진","학익진법"]},
    {id:"e08",q:"물 분자의 화학식은?",a:["H2O","h2o"]},
    {id:"e09",q:"혈액 순환 펌프 역할을 하는 신체 기관은?",a:["심장","heart"]},
    {id:"e10",q:"이산화탄소의 화학식은?",a:["CO2","co2"]},
  ],
  normal:[
    {id:"n01",q:"DNA의 이중나선 구조를 발견한 과학자들 중 한 명은?",a:["왓슨","크릭","왓슨과 크릭"]},
    {id:"n02",q:"빛의 속도보다 빠른 것은 없다고 주장한 아인슈타인의 이론은?",a:["특수 상대성 이론","특수상대성이론","상대성 이론"]},
    {id:"n03",q:"삼국시대 신라의 고분군으로 UNESCO 세계유산에 등재된 경주의 유적지는?",a:["경주역사유적지구","경주 역사유적지구"]},
    {id:"n04",q:"일본에 원자폭탄이 투하된 두 도시는? (하나만 답하세요)",a:["히로시마","나가사키"]},
    {id:"n05",q:"혈액형 ABO식 분류에서 모든 혈액형에게 수혈 가능한 혈액형은?",a:["O형","O"]},

    {id:"n09",q:"제1차 세계대전의 직접적 도화선이 된 사건은?",a:["사라예보 사건","사라예보사건","오스트리아 황태자 암살"]},

    {id:"n11",q:"고려의 대장경을 보관하고 있는 경남 합천의 사찰은?",a:["해인사"]},

    {id:"n15",q:"현재 UN 안전보장이사회 상임이사국이 아닌 나라는? (한국/독일/일본 중)",a:["한국","독일","일본"]},
    {id:"n16",q:"물이 끓는 점(1기압)은 섭씨 몇 도인가?",a:["100도","100℃","100"]},

    {id:"n18",q:"태양계에서 태양과 가장 가까운 행성은?",a:["수성","mercury"]},
    {id:"n19",q:"1866년 프랑스 함대의 침략을 격퇴한 조선의 전투는?",a:["병인양요","병인 양요"]},

    {id:"n22",q:"지구 내부에서 가장 두꺼운 층은?",a:["맨틀"]},
    {id:"n23",q:"2024 파리 올림픽에서 대한민국 금메달 종목 '양궁' 외에 추가 금메달 종목은?",a:["사격","펜싱"]},
    {id:"n24",q:"페니실린을 발견한 스코틀랜드 과학자는?",a:["알렉산더 플레밍","플레밍"]},
    {id:"n25",q:"마그나카르타(Magna Carta)가 서명된 연도는?",a:["1215년","1215"]},
  ],
  hard:[
    {id:"h01",q:"양자역학에서 입자의 위치와 운동량을 동시에 정확히 알 수 없다는 원리는?",a:["불확정성 원리","하이젠베르크 불확정성 원리"]},

function norm(s){
  if(!s)return"";
  return String(s).toLowerCase().trim()
    .replace(/\s+/g,"").replace(/[.,!?℃]/g,"")
    .replace(/킬로미터/g,"km").replace(/년$/,"").replace(/도$/,"");
}
function checkAns(u,list){
  if(!u||!Array.isArray(list))return false;
  var un=norm(u);if(!un)return false;
  return list.some(function(a){
    var c=norm(a);if(c===un)return true;
    var n1=un.replace(/[^0-9.-]/g,""),n2=c.replace(/[^0-9.-]/g,"");
    return n1&&n2&&n1===n2;
  });
}
function shuffle(a){var arr=a.slice();for(var i=arr.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=arr[i];arr[i]=arr[j];arr[j]=t;}return arr;}

function buildQuiz(category,difficulty){
  var pool;
  if(difficulty==="easy")pool=QDB.easy;
  else if(difficulty==="hard")pool=QDB.hard.concat(QDB.normal.slice(0,5));
  else pool=QDB.normal; // normal (default)

  var picked=shuffle(pool).slice(0,9);
  // 마지막 문제는 항상 어려운 골든벨 (2점)
  var golden=shuffle(QDB.hard)[0];
  golden=Object.assign({},golden,{sc:2,golden:true});
  picked.forEach(function(q){q.sc=1;q.golden=false;});
  return picked.concat([golden]);
}

function diffLabel(d){return{easy:"🟢 쉬움",normal:"🟡 보통",hard:"🔴 어려움"}[d]||d;}

  hintUsed=0;hintText="";
  beginRound(0,curRoom.startTime);
}

function beginRound(idx,startTs){
  if(timerIv)clearInterval(timerIv);
  if(resultTo)clearTimeout(resultTo);
  qIdx=idx;submitted=false;submittedAns="";roundOverlay=null;hintText="";
  if(curRoom){curRoom.qIdx=idx;curRoom.startTime=startTs;}
  ROUND_SEC=getRoundSec();
  var elapsed=Math.floor((Date.now()-startTs)/1000);
  timeLeft=Math.max(0,ROUND_SEC-elapsed);
  appState="QUIZ";activeTab="quiz";
  render();
  timerIv=setInterval(function(){
    var e=Math.floor((Date.now()-(curRoom?curRoom.startTime:startTs))/1000);
    timeLeft=Math.max(0,ROUND_SEC-e);
    updTimer();
    if(timeLeft<=0){clearInterval(timerIv);timerIv=null;timeLeft=0;updTimer();if(isHost())evalRound();}
  },500);
}
function isHost(){return curRoom&&curRoom.hostId===MY_ID;}

function renderQuiz(){
  var room=curRoom;
  var quiz=room.quizSet[qIdx]||room.quizSet[0];
  var total=room.quizSet.length;
  var golden=quiz.golden||qIdx===total-1;
  var pct=timeLeft/ROUND_SEC*100,warn=timeLeft<=5;

  var div=mk("div","display:flex;flex-direction:column;height:100%;position:relative");

  // 탭바 (퀴즈 | 채팅)
  var tabHtml='<div class="tab-bar">'+
    '<div class="tab'+(activeTab==="quiz"?" active":"")+'" id="tab-quiz">Q.'+(qIdx+1)+'/'+total+'</div>'+
    '<div class="tab'+(activeTab==="chat"?" active":"")+'" id="tab-chat">💬 채팅</div>'+
    '</div>';

  var contentHtml;
  if(activeTab==="chat"){
    contentHtml=[
      '<div style="flex:1;display:flex;flex-direction:column;padding:10px 14px;min-height:0">',
      '<div id="chat-msgs" class="chat-msgs"></div>',
      '</div>',
      '<div style="padding:10px 14px;border-top:1px solid var(--border);display:flex;gap:8px">',
      '<input id="ci" type="text" placeholder="메시지 입력..." style="flex:1;height:40px">',
      '<button id="cs" style="height:40px;padding:0 14px;font-size:.85rem">전송</button>',
      '</div>'
    ].join("");
  } else {
    var hintLeft=MAX_HINTS-hintUsed;
    contentHtml=[
      '<div style="padding:14px 18px 6px">',
      '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px">',
      '<div>',
      golden?'<span class="chip chip-host" style="font-size:.76rem;padding:3px 9px">💡 골든벨 2점</span>':
             '<span class="chip" style="background:var(--border);color:var(--sub);font-size:.76rem;padding:3px 9px">일반 1점</span>',
      '</div>',
      '<div style="display:flex;align-items:center;gap:8px">',
      '<button class="hint-btn" id="hint-btn"'+(submitted||hintLeft===0?' disabled':'')+'>💡 힌트 ('+hintLeft+'회)</button>',
      '<span id="t-text" style="font-weight:900;font-size:1rem;color:'+(warn?'var(--red)':'var(--focus)')+'">'+timeLeft+'초</span>',
      '</div></div>',
      '<div class="timer-wrap"><div id="t-bar" class="timer-fill'+(warn?' warn':'')+'" style="width:'+pct+'%"></div></div>',
      '</div>',
      '<div style="padding:0 18px;flex:1;overflow-y:auto">',
      '<div class="q-box">'+quiz.q+'</div>',
      hintText?'<div class="hint-box">💡 힌트: '+hintText+'</div>':'',
      '<div class="card" style="padding:8px 12px;margin-top:10px">',
      '<div style="font-size:.74rem;font-weight:700;color:var(--sub);margin-bottom:6px">제출 현황</div>',
      '<div style="display:flex;flex-wrap:wrap;gap:4px">',
      room.players.map(function(p){
        var has=room.subs&&room.subs[qIdx]&&room.subs[qIdx][p.id];
        return'<div style="display:flex;align-items:center;gap:3px;background:var(--inp);padding:3px 8px;border-radius:7px;font-size:.74rem;border:1px solid var(--border)">'+
          '<span style="font-weight:800">'+p.nickname+'</span>'+
          '<span style="font-size:.66rem;font-weight:800;padding:1px 5px;border-radius:4px;background:'+(has?'#10b98133':'var(--border)')+';color:'+(has?'var(--green)':'var(--muted)')+'">'+(has?'제출':'대기')+'</span>'+
          '</div>';
      }).join(""),
      '</div></div></div>',
      '<div class="bottom-bar">',
      '<form id="af" style="display:flex;gap:8px">',
      '<input id="ai" type="text" placeholder="'+(submitted?'제출 완료 ✓':'정답 입력 후 엔터')+'" '+(submitted||timeLeft<=0?'disabled':'')+' style="flex:1;height:44px">',
      '<button type="submit" class="'+(golden?'btn-gold':'')+'" style="height:44px;padding:0 16px" '+(submitted||timeLeft<=0?'disabled':'')+'>'+
      (submitted?'✓':'제출')+'</button>',
      '</form></div>'
    ].join("");
  }

  div.innerHTML=tabHtml+contentHtml;
  appEl.appendChild(div);

  // 탭
  var tq=document.getElementById("tab-quiz"),tc=document.getElementById("tab-chat");
  if(tq)tq.addEventListener("click",function(){activeTab="quiz";render();});
  if(tc)tc.addEventListener("click",function(){activeTab="chat";render();});

  if(activeTab==="chat"){
    setupChatInput(curRoomId);
    var box=document.getElementById("chat-msgs");
    if(box){chatMsgs.forEach(function(m){appendChatMsg(box,m);});box.scrollTop=box.scrollHeight;}
  } else {
    // ★ 핵심 수정: 이미 입력 중인 값은 보존 (다른 사람 제출해도 내 입력 안 날아감)
    var inp=document.getElementById("ai");
    if(inp&&!submitted&&timeLeft>0){inp.focus();}

    var form=document.getElementById("af");
    if(form)form.addEventListener("submit",function(e){
      e.preventDefault();
      var ans=document.getElementById("ai").value.trim();
      if(!ans){alert("답안을 입력해 주세요.");return;}
      submitAns(ans);
    });

    var hintBtn=document.getElementById("hint-btn");
    if(hintBtn)hintBtn.addEventListener("click",function(){
      if(submitted||hintUsed>=MAX_HINTS)return;
      hintUsed++;
      var quiz2=curRoom.quizSet[qIdx];
      hintText=HINTS[quiz2.id]||"힌트가 없습니다.";
      render();
    });
  }
  if(roundOverlay)showOverlay(roundOverlay);
}

function updTimer(){
  var b=document.getElementById("t-bar"),t=document.getElementById("t-text");
  if(!b||!t)return;
  b.style.width=(timeLeft/ROUND_SEC*100)+"%";
  var w=timeLeft<=5;
  b.className="timer-fill"+(w?" warn":"");
  t.textContent=timeLeft+"초";
  t.style.color=w?"var(--red)":"var(--focus)";
}

// ★ 핵심 수정: 답 제출 시 render() 대신 부분 업데이트
function submitAns(ans){
  if(submitted)return;
  submitted=true;submittedAns=ans;
  var quiz=curRoom.quizSet[qIdx];
  var correct=checkAns(ans,quiz.a);
  var timeTaken=Date.now()-curRoom.startTime;
  // 점수 = 기본점수 + 속도 보너스 (5초 안에 맞추면 +1)
  var base=correct?quiz.sc:0;
  var speedBonus=(correct&&timeTaken<5000)?1:0;
  var earned=base+speedBonus;
  var sub={playerId:MY_ID,nickname:profile.nickname,answer:ans,isCorrect:correct,score:earned,timeTaken:timeTaken,speedBonus:speedBonus};
  if(!curRoom.subs)curRoom.subs={};
  if(!curRoom.subs[qIdx])curRoom.subs[qIdx]={};
  curRoom.subs[qIdx][MY_ID]=sub;
  upsertRoom(curRoom);
  pubRoom(curRoomId,"SUBMITTED_ANSWER",{qIdx:qIdx,sub:sub});
  if(isHost())checkAllSub();

  // ★ 제출 후 입력창만 업데이트 (전체 re-render 안 함 → 다른 사람 제출해도 내 화면 유지)
  var inp=document.getElementById("ai");
  if(inp){inp.value=ans;inp.disabled=true;}
  var sbtn=document.querySelector("#af button[type=submit]");
  if(sbtn){sbtn.textContent="✓";sbtn.disabled=true;}
  var hb=document.getElementById("hint-btn");
  if(hb)hb.disabled=true;

  if(correct){
    floatScore("+"+earned+"점"+(speedBonus?" ⚡":""));
  }
}

function floatScore(txt){
  var el=document.createElement("div");
  el.className="score-float";
  el.textContent=txt;
  el.style.left="50%";el.style.top="60%";el.style.transform="translateX(-50%)";
  document.body.appendChild(el);
  setTimeout(function(){if(el.parentNode)el.parentNode.removeChild(el);},900);
}

function checkAllSub(){
  if(!isHost()||!curRoom)return;
  var subs=(curRoom.subs&&curRoom.subs[qIdx])||{};
  if(Object.keys(subs).length>=curRoom.players.length){
    if(timerIv){clearInterval(timerIv);timerIv=null;}
    evalRound();
  }
}

function evalRound(){
  if(!isHost()||!curRoom)return;
  var quiz=curRoom.quizSet[qIdx];
  var subs=(curRoom.subs&&curRoom.subs[qIdx])||{};
  var results=curRoom.players.map(function(p){
    var s=subs[p.id];
    var correct=s?s.isCorrect:false;
    var earned=s?s.score:0;
    p.score=(p.score||0)+earned;
    p.totalTime=(p.totalTime||0)+(s?s.timeTaken:ROUND_SEC*1000);
    return{id:p.id,nickname:p.nickname,isCorrect:correct,earnedScore:earned,score:p.score,userAnswer:s?s.answer:"",speedBonus:s?s.speedBonus:0};
  });
  upsertRoom(curRoom);
  var result={qIdx:qIdx,correctAnswerText:quiz.a[0],players:results,room:curRoom};
  pubRoom(curRoomId,"ROUND_RESULT",{result:result});
  handleResult(result);
}

function handleResult(result){
  if(timerIv){clearInterval(timerIv);timerIv=null;}
  roundOverlay=result;
  if(result.room){curRoom=result.room;upsertRoom(curRoom);}
  render();
  if(resultTo)clearTimeout(resultTo);
  resultTo=setTimeout(function(){
    roundOverlay=null;
    if(isHost()){
      var next=qIdx+1;
      if(curRoom&&next<curRoom.quizSet.length){
        curRoom.startTime=Date.now();upsertRoom(curRoom);
        pubRoom(curRoomId,"NEXT_ROUND",{qIdx:next,startTime:curRoom.startTime});
        hintUsed=0;hintText="";
        beginRound(next,curRoom.startTime);
      } else {
        pubRoom(curRoomId,"GAME_OVER",{});
        appState="RESULT";render();
      }
    }
  },4000);
}

function showOverlay(result){
  var ov=mk("div","");ov.className="overlay";
  var ok=result.players.filter(function(p){return p.isCorrect;});
  var bad=result.players.filter(function(p){return!p.isCorrect;});
  ov.innerHTML=[
    '<div class="overlay-box">',
    '<div style="text-align:center;font-size:.76rem;color:var(--sub)">Q.'+(result.qIdx+1)+' 라운드 결과</div>',
    '<h3 style="text-align:center;font-size:1.1rem;font-weight:900;margin:4px 0 12px">정답 공개</h3>',
    '<div style="background:rgba(59,130,246,.12);border:1px solid var(--focus);border-radius:10px;padding:10px;text-align:center;font-weight:800;margin-bottom:12px">',
    '정답: <span style="font-size:1.1rem">'+result.correctAnswerText+'</span></div>',
    '<div style="font-size:.8rem;font-weight:800;color:var(--green);margin-bottom:5px">✓ 정답자 ('+ok.length+'명)</div>',
    '<div style="display:flex;flex-direction:column;gap:4px;margin-bottom:10px">',
    ok.length===0?'<div style="font-size:.76rem;color:var(--muted)">없음</div>':
    ok.map(function(p){
      return'<div style="display:flex;justify-content:space-between;align-items:center;background:var(--inp);padding:6px 12px;border-radius:8px;border:1px solid var(--border)">'+
        '<span style="font-weight:800;font-size:.85rem">'+p.nickname+'</span>'+
        '<span class="chip chip-ok">+'+p.earnedScore+'점'+(p.speedBonus?' ⚡':'')+' (누적 '+p.score+'점)</span></div>';
    }).join(""),
    '</div>',
    '<div style="font-size:.8rem;font-weight:800;color:var(--red);margin-bottom:5px">✗ 오답/미제출 ('+bad.length+'명)</div>',
    '<div style="display:flex;flex-direction:column;gap:4px">',
    bad.length===0?'<div style="font-size:.76rem;color:var(--muted)">없음</div>':
    bad.map(function(p){
      return'<div style="display:flex;justify-content:space-between;align-items:center;background:var(--inp);padding:6px 12px;border-radius:8px;border:1px solid var(--border)">'+
        '<span style="font-weight:800;font-size:.85rem">'+p.nickname+' <span style="font-size:.7rem;color:var(--muted)">"'+(p.userAnswer||'미제출')+'"</span></span>'+
        '<span class="chip chip-err">+0점</span></div>';
    }).join(""),
    '</div>',
    '<div style="text-align:center;font-size:.74rem;color:var(--muted);margin-top:12px">잠시 후 다음 문제로 이동...</div>',
    '</div>'
  ].join("");
  appEl.appendChild(ov);
}

// ── 결과 화면 ────────────────────────────────────────────
function renderResult(){
  var sorted=curRoom.players.slice().sort(function(a,b){return b.score!==a.score?b.score-a.score:(a.totalTime||0)-(b.totalTime||0);});
  var p1=sorted[0]||{nickname:"-",score:0},p2=sorted[1]||null,p3=sorted[2]||null;
  var div=mk("div","display:flex;flex-direction:column;height:100%;padding:16px;overflow-y:auto");
  div.innerHTML=[
    '<div style="text-align:center;margin-bottom:10px">',
    '<div style="font-size:1.8rem;margin-bottom:4px">🏆</div>',
    '<h2 style="font-size:1.3rem;font-weight:900">FINAL RESULT</h2>',
    '<p style="color:var(--sub);font-size:.8rem;margin-top:4px">'+curRoom.quizSet.length+'라운드 대전 종료</p></div>',
    '<div class="podium-wrap">',
    p2?'<div class="podium-slot r2"><div class="p-name">'+p2.nickname+'</div><div class="p-score">'+p2.score+'점</div><div class="podium-box">2</div></div>':'<div class="podium-slot r2"></div>',
    '<div class="podium-slot r1"><div style="font-size:.66rem;font-weight:900;color:var(--gold);margin-bottom:2px">CHAMPION</div><div class="p-name" style="font-size:.92rem">'+p1.nickname+'</div><div class="p-score" style="color:var(--gold)">'+p1.score+'점</div><div class="podium-box">1</div></div>',
    p3?'<div class="podium-slot r3"><div class="p-name">'+p3.nickname+'</div><div class="p-score">'+p3.score+'점</div><div class="podium-box">3</div></div>':'<div class="podium-slot r3"></div>',
    '</div>',
    '<div class="card" style="margin-bottom:12px">',
    '<div style="font-weight:700;font-size:.8rem;color:var(--sub);margin-bottom:10px">종합 순위</div>',
    sorted.map(function(p,i){
      return'<div style="display:flex;justify-content:space-between;align-items:center;background:var(--inp);padding:10px 14px;border-radius:10px;border:1px solid var(--border);margin-bottom:'+(i<sorted.length-1?'6':'0')+'px">'+
        '<div style="display:flex;align-items:center;gap:10px">'+
        '<span style="font-weight:900;font-size:.95rem;width:28px;color:'+(i===0?'var(--gold)':'var(--txt)')+'">'+(i+1)+'위</span>'+
        '<span style="font-weight:800;font-size:.9rem">'+p.nickname+'</span></div>'+
        '<span style="font-weight:900;font-size:1rem;color:var(--focus)">'+p.score+'점</span></div>';
    }).join(""),
    '</div>',
    '<button id="lbtn" style="width:100%">로비로 돌아가기</button>'
  ].join("");
  appEl.appendChild(div);
  document.getElementById("lbtn").addEventListener("click",function(){
    leaveRoom(curRoomId,MY_ID);
    curRoomId=null;curRoom=null;chatMsgs=[];appState="LOBBY";render();
  });
}

// ── MQTT 메시지 핸들러 ───────────────────────────────────
function onMqttMsg(msg,topic){
  var type=msg.type,p=msg.payload||msg;

  // 채팅
  if(topic&&topic.startsWith(TOPIC_CHAT)){
    if(type==="CHAT"){addChat({nickname:p.nickname,text:p.text,mine:false});}
    return;
  }

  // 방 목록
  if(topic===TOPIC_ROOMS){
    if(type==="ROOM_LIST_UPDATE"&&Array.isArray(p.rooms)){
      mergeRooms(p.rooms);
      if(appState==="LOBBY")render();
    }
    return;
  }

  // 방별 메시지
  if(!curRoomId)return;
  if(topic!==TOPIC_ROOM+curRoomId)return;

  if(type==="ROOM_STATE_UPDATE"){
    if(!p.room)return;
    var incoming=p.room,local=rooms.get(curRoomId);
    if(local&&local.hostId===MY_ID){
      // 방장: 플레이어 목록 머지
      var existingIds=new Set(local.players.map(function(x){return x.id;}));
      incoming.players.forEach(function(np){
        if(!existingIds.has(np.id))local.players.push(np);
        else{var ep=local.players.find(function(x){return x.id===np.id;});if(ep){ep.isReady=np.isReady;}}
      });
      var inIds=new Set(incoming.players.map(function(x){return x.id;}));
      local.players=local.players.filter(function(x){return inIds.has(x.id)||x.id===MY_ID;});
      rooms.set(curRoomId,local);curRoom=local;

      // 새 참가자 입장 알림
      incoming.players.forEach(function(np){
        if(!existingIds.has(np.id))addSysMsg(np.nickname+"님이 입장했습니다.");
      });
    } else {
      upsertRoom(incoming);curRoom=rooms.get(curRoomId)||incoming;
    }
    if(appState==="WAITING")render();
  }
  else if(type==="HOST_CHANGED"){
    if(p.newHostId===MY_ID&&curRoom){curRoom.hostId=MY_ID;publishRoomList();}
    if(p.room){upsertRoom(p.room);curRoom=rooms.get(curRoomId)||p.room;}
    if(appState==="WAITING")render();
  }
  else if(type==="GAME_STARTED"){
    if(p.room){curRoom=p.room;upsertRoom(curRoom);}
    if(p.quizSet)curRoom.quizSet=p.quizSet;
    curRoom.startTime=p.startTime||Date.now();
    upsertRoom(curRoom);hintUsed=0;hintText="";
    beginRound(0,curRoom.startTime);
  }
  else if(type==="SUBMITTED_ANSWER"){
    // ★ 다른 사람 제출 시 제출현황만 업데이트, 내 입력창 건드리지 않음
    if(!p.sub)return;
    if(!curRoom.subs)curRoom.subs={};
    if(!curRoom.subs[p.qIdx])curRoom.subs[p.qIdx]={};
    curRoom.subs[p.qIdx][p.sub.playerId]=p.sub;
    upsertRoom(curRoom);
    if(isHost())checkAllSub();
    // 내 현재 입력값 보존하면서 제출현황만 갱신
    if(appState==="QUIZ"&&activeTab==="quiz"){
      var myInput=document.getElementById("ai");
      var myVal=myInput?myInput.value:"";
      render();
      // 렌더 후 입력값 복원
      var newInput=document.getElementById("ai");
      if(newInput&&!submitted){newInput.value=myVal;newInput.focus();}
    }
  }
  else if(type==="ROUND_RESULT"){
    if(!isHost()&&p.result)handleResult(p.result);
  }
  else if(type==="NEXT_ROUND"){
    if(!isHost()){
      if(p.startTime&&curRoom)curRoom.startTime=p.startTime;
      hintUsed=0;hintText="";
      beginRound(p.qIdx,p.startTime);
    }
  }
  else if(type==="GAME_OVER"){
    appState="RESULT";render();
  }
}

// ── 유틸 ────────────────────────────────────────────────
function mk(tag,style){var e=document.createElement(tag);if(style)e.style.cssText=style;return e;}

// ── 시작 ────────────────────────────────────────────────
initMQTT(onMqttMsg);
render();

})();
</script>
