<script>
(function(){
"use strict";

// ──────────────────────────────────────────────────────────
//  식별자
// ──────────────────────────────────────────────────────────
if(!window.name||!window.name.startsWith("tq_"))
  window.name="tq_"+Math.random().toString(36).substr(2,8)+"_"+Date.now();
var MY_ID="p_"+window.name;

// ──────────────────────────────────────────────────────────
//  MQTT 설정
//  HiveMQ 공개 브로커: 무료, 계정 불필요, 전 세계 모든 기기에서 통신 가능
//  retain=true 옵션: 새로 접속하는 클라이언트도 즉시 최신 방 목록을 받음
// ──────────────────────────────────────────────────────────
var BROKER = "wss://broker.hivemq.com:8884/mqtt";
var TOPIC_ROOMS  = "tqbattle/v1/rooms";          // 방 목록 (retain)
var TOPIC_ROOM   = "tqbattle/v1/room/";          // 방별 이벤트 (prefix)

var mqttClient = null;
var mqttReady  = false;
var subTopics  = new Set();
var msgQueue   = [];           // 연결 전 보내려던 메시지 버퍼
var netBadge   = document.getElementById("net-status");

function initMQTT(onMsg) {
  var clientId = "tqb_" + Math.random().toString(36).substr(2,10);
  mqttClient = mqtt.connect(BROKER, {
    clientId   : clientId,
    clean      : true,
    keepalive  : 30,
    reconnectPeriod: 2000,
    connectTimeout : 10000
  });

  mqttClient.on("connect", function() {
    mqttReady = true;
    setNet("ok","● 연결됨");

    // 방 목록 토픽 구독 (retain 포함: 접속 즉시 최신 방 목록 수신)
    mqttSub(TOPIC_ROOMS);

    // 버퍼된 메시지 플러시
    msgQueue.forEach(function(m){ mqttPub(m.topic,m.payload,m.retain); });
    msgQueue = [];
  });

  mqttClient.on("reconnect", function(){ setNet("warn","● 재연결 중..."); });
  mqttClient.on("offline",   function(){ setNet("","● 오프라인"); mqttReady=false; });
  mqttClient.on("error",     function(e){ console.warn("MQTT err",e); });

  mqttClient.on("message", function(topic, buf) {
    try {
      var msg = JSON.parse(buf.toString());
      if(msg && msg.sid !== MY_ID) onMsg(msg, topic);   // 내 메시지 제외
      else if(msg && msg.sid === MY_ID && msg._loopback) onMsg(msg, topic); // loopback 허용된 것만
    } catch(e) {}
  });
}

function mqttSub(topic) {
  if(subTopics.has(topic)) return;
  subTopics.add(topic);
  if(mqttReady) mqttClient.subscribe(topic, {qos:1});
  else mqttClient.once("connect", function(){ mqttClient.subscribe(topic, {qos:1}); });
}

function mqttPub(topic, payload, retain) {
  var buf = JSON.stringify(Object.assign({}, payload, {sid: MY_ID, ts: Date.now()}));
  if(!mqttReady) { msgQueue.push({topic:topic,payload:payload,retain:!!retain}); return; }
  mqttClient.publish(topic, buf, {qos:1, retain:!!retain});
}

function setNet(cls, txt) {
  netBadge.className = cls;
  netBadge.textContent = txt;
}

// ──────────────────────────────────────────────────────────
//  방 상태 (인메모리)
// ──────────────────────────────────────────────────────────
var rooms = new Map();

function getRooms() {
  return Array.from(rooms.values()).filter(function(r){
    return r && Array.isArray(r.players) && r.players.length > 0;
  });
}
function mergeRooms(list) {
  if(!Array.isArray(list)) return;
  list.forEach(function(r){
    if(!r||!r.id) return;
    var existing = rooms.get(r.id);
    // 내가 호스트인 방은 외부 데이터로 덮어쓰지 않음
    if(existing && existing.hostId === MY_ID) return;
    if(r.players && r.players.length > 0) rooms.set(r.id, r);
    else rooms.delete(r.id);
  });
}
function upsertRoom(r) {
  if(!r||!r.id) return;
  if(!r.players||r.players.length===0) rooms.delete(r.id);
  else rooms.set(r.id, r);
}

function publishRoomList() {
  // retain=true: 나중에 접속하는 기기도 즉시 방 목록을 받음
  mqttPub(TOPIC_ROOMS, {type:"ROOM_LIST_UPDATE", rooms: getRooms()}, true);
}

// 방 생성/수정 시 방별 토픽 구독
function subRoomTopic(roomId) {
  mqttSub(TOPIC_ROOM + roomId);
}
function pubRoom(roomId, type, payload) {
  mqttPub(TOPIC_ROOM + roomId, Object.assign({type:type}, payload), false);
}

// 방 CRUD
function createRoom(opts) {
  // 기존 내 방 정리
  rooms.forEach(function(r,id){
    r.players = r.players.filter(function(p){return p.id!==MY_ID;});
    if(r.players.length===0) rooms.delete(id);
  });
  var room = {
    id       : "rm_"+Math.random().toString(36).substr(2,7),
    title    : opts.title || opts.hostNickname+"님의 방",
    category : opts.category || "all",
    maxPlayers: Number(opts.maxPlayers)||4,
    hostId   : MY_ID,
    status   : "waiting",
    players  : [{id:MY_ID,nickname:opts.hostNickname,avatar:opts.hostNickname[0].toUpperCase(),isHost:true,isReady:true,score:0,totalTime:0}],
    quizSet:[],qIdx:0,startTime:0,subs:{}
  };
  rooms.set(room.id, room);
  subRoomTopic(room.id);
  publishRoomList();
  return room;
}

function joinRoom(roomId, player) {
  var room = rooms.get(roomId);
  if(!room) return null;
  if(!room.players.find(function(p){return p.id===player.id;})) {
    if(room.players.length>=room.maxPlayers){alert("방이 가득 찼습니다.");return null;}
    room.players.push({id:player.id,nickname:player.nickname,avatar:player.nickname[0].toUpperCase(),isHost:false,isReady:false,score:0,totalTime:0});
  }
  rooms.set(room.id,room);
  subRoomTopic(room.id);
  pubRoom(room.id,"ROOM_STATE_UPDATE",{room:room});
  publishRoomList();
  return room;
}

function toggleReady(roomId, playerId) {
  var room=rooms.get(roomId); if(!room) return;
  var p=room.players.find(function(p){return p.id===playerId;});
  if(p&&!p.isHost){
    p.isReady=!p.isReady;
    rooms.set(room.id,room);
    pubRoom(room.id,"ROOM_STATE_UPDATE",{room:room});
  }
}

function leaveRoom(roomId, playerId) {
  var room=rooms.get(roomId); if(!room) return;
  var wasHost=room.hostId===playerId;
  room.players=room.players.filter(function(p){return p.id!==playerId;});
  if(room.players.length===0){
    rooms.delete(roomId);
    // retain 삭제: 빈 방 정보 지우기 (빈 payload로 retain 덮어씀)
    mqttPub(TOPIC_ROOMS,{type:"ROOM_LIST_UPDATE",rooms:getRooms()},true);
  } else {
    if(wasHost){
      room.players[0].isHost=true;
      room.players[0].isReady=true;
      room.hostId=room.players[0].id;
      pubRoom(roomId,"HOST_CHANGED",{newHostId:room.hostId,room:room});
    }
    rooms.set(roomId,room);
    publishRoomList();
    pubRoom(roomId,"ROOM_STATE_UPDATE",{room:room});
  }
}

window.addEventListener("beforeunload",function(){
  if(curRoomId) leaveRoom(curRoomId,MY_ID);

function norm(s){
  if(!s) return "";
  return String(s).toLowerCase().trim()
    .replace(/\s+/g,"").replace(/[.,!?]/g,"")
    .replace(/킬로미터/g,"km").replace(/개$/,"").replace(/점$/,"");
}
function checkAns(u,list){
  if(!u||!Array.isArray(list)) return false;
  var un=norm(u); if(!un) return false;
  return list.some(function(a){
    var c=norm(a); if(c===un) return true;
    var n1=un.replace(/[^0-9.]/g,""),n2=c.replace(/[^0-9.]/g,"");
    return n1&&n2&&n1===n2;
  });
}
function shuffle(a){
  var arr=a.slice();
  for(var i=arr.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=arr[i];arr[i]=arr[j];arr[j]=t;}
  return arr;
}
function buildQuiz(cat){
  var ones=QDB.filter(function(q){return q.sc===1;});
  var twos=QDB.filter(function(q){return q.sc===2;});
  if(cat!=="all"){var f=ones.filter(function(q){return q.cat===cat;});if(f.length>=9)ones=f;}
  return shuffle(ones).slice(0,9).concat(shuffle(twos).slice(0,1));
}
function catLabel(c){return{all:"전체",history:"역사",science:"과학",sports:"스포츠",economy:"경제",culture:"문화",geo:"지리"}[c]||c;}

  publishRoomList();

// 퀴즈
function beginRound(idx,startTs){
  if(timerIv) clearInterval(timerIv);
  if(resultTo) clearTimeout(resultTo);
  qIdx=idx;submitted=false;submittedAns="";roundOverlay=null;
  if(curRoom){curRoom.qIdx=idx;curRoom.startTime=startTs;}
  var el0=Math.floor((Date.now()-startTs)/1000);
  timeLeft=Math.max(0,15-el0);
  appState="QUIZ";render();
  timerIv=setInterval(function(){
    var e=Math.floor((Date.now()-(curRoom?curRoom.startTime:startTs))/1000);
    timeLeft=Math.max(0,15-e);
    updTimer();
    if(timeLeft<=0){clearInterval(timerIv);timerIv=null;timeLeft=0;updTimer();if(isHost())evalRound();}
  },500);
}
function isHost(){return curRoom&&curRoom.hostId===MY_ID;}

function renderQuiz(){
  var room=curRoom;
  var quiz=room.quizSet[qIdx]||room.quizSet[0];
  var total=room.quizSet.length;

    '<div style="padding:16px 18px 8px">',

      var has=room.subs&&room.subs[qIdx]&&room.subs[qIdx][p.id];
      return '<div style="display:flex;align-items:center;gap:4px;background:var(--inp);padding:3px 8px;border-radius:7px;font-size:.76rem;border:1px solid var(--border)">'+

    }).join(""),
    '</div></div></div>',

    '<input id="ai" type="text" placeholder="'+(submitted?'제출 완료 ✓':'정답 입력 후 엔터')+'" value="'+(submittedAns||'')+'" '+(submitted||timeLeft<=0?'disabled':'')+' style="flex:1">',
    '<button type="submit" class="'+(golden?'btn-gold':'')+'" style="width:78px" '+(submitted||timeLeft<=0?'disabled':'')+'>'+

    submitAns(ans);

  if(roundOverlay) showOverlay(roundOverlay);

function updTimer(){
  var b=document.getElementById("tb"),t=document.getElementById("tt");
  if(!b||!t) return;
  b.style.width=(timeLeft/15*100)+"%";
  var w=timeLeft<=4;
  b.className="timer-fill"+(w?" warn":"");
  t.textContent=timeLeft+"초";
  t.style.color=w?"var(--red)":"var(--focus)";
}

function submitAns(ans){
  if(submitted) return;
  submitted=true;submittedAns=ans;
  var quiz=curRoom.quizSet[qIdx];
  var correct=checkAns(ans,quiz.a);
  var sub={playerId:MY_ID,nickname:profile.nickname,answer:ans,isCorrect:correct,score:correct?quiz.sc:0,timeTaken:Date.now()-curRoom.startTime};
  if(!curRoom.subs)curRoom.subs={};
  if(!curRoom.subs[qIdx])curRoom.subs[qIdx]={};
  curRoom.subs[qIdx][MY_ID]=sub;
  upsertRoom(curRoom);
  pubRoom(curRoomId,"SUBMITTED_ANSWER",{qIdx:qIdx,sub:sub});
  if(isHost()) checkAllSub();
  render();
}

function checkAllSub(){
  if(!isHost()||!curRoom) return;
  var subs=(curRoom.subs&&curRoom.subs[qIdx])||{};
  if(Object.keys(subs).length>=curRoom.players.length){
    if(timerIv){clearInterval(timerIv);timerIv=null;}
    evalRound();
  }
}

function evalRound(){
  if(!isHost()||!curRoom) return;
  var quiz=curRoom.quizSet[qIdx];
  var subs=(curRoom.subs&&curRoom.subs[qIdx])||{};
  var results=curRoom.players.map(function(p){
    var s=subs[p.id];
    var correct=s?s.isCorrect:false;
    var earned=correct?quiz.sc:0;
    p.score=(p.score||0)+earned;
    p.totalTime=(p.totalTime||0)+(s?s.timeTaken:15000);
    return{id:p.id,nickname:p.nickname,isCorrect:correct,earnedScore:earned,score:p.score,userAnswer:s?s.answer:""};
  });
  upsertRoom(curRoom);
  var result={qIdx:qIdx,correctAnswerText:quiz.a[0],players:results,room:curRoom};
  pubRoom(curRoomId,"ROUND_RESULT",{result:result});
  handleResult(result);
}

function handleResult(result){
  if(timerIv){clearInterval(timerIv);timerIv=null;}
  roundOverlay=result;
  if(result.room){curRoom=result.room;upsertRoom(curRoom);}
  render();
  if(resultTo) clearTimeout(resultTo);
  resultTo=setTimeout(function(){
    roundOverlay=null;
    if(isHost()){
      var next=qIdx+1;
      if(curRoom&&next<curRoom.quizSet.length){
        curRoom.startTime=Date.now();upsertRoom(curRoom);
        pubRoom(curRoomId,"NEXT_ROUND",{qIdx:next,startTime:curRoom.startTime});
        beginRound(next,curRoom.startTime);
      } else {
        pubRoom(curRoomId,"GAME_OVER",{});
        appState="RESULT";render();
      }
    }
  },3500);
}

function showOverlay(result){
  var ov=el("div","");ov.className="overlay";
  var ok=result.players.filter(function(p){return p.isCorrect;});
  var bad=result.players.filter(function(p){return!p.isCorrect;});
  ov.innerHTML=[
    '<div class="overlay-box">',
    '<div style="text-align:center;font-size:.76rem;color:var(--sub)">Q.'+(result.qIdx+1)+' 라운드 결과</div>',
    '<h3 style="text-align:center;font-size:1.15rem;font-weight:900;margin:4px 0 14px">정답 공개</h3>',
    '<div style="background:rgba(59,130,246,.12);border:1px solid var(--focus);border-radius:10px;padding:10px;text-align:center;font-weight:800;margin-bottom:14px">',
    '정답: <span style="font-size:1.15rem">'+result.correctAnswerText+'</span></div>',
    '<div style="font-size:.8rem;font-weight:800;color:var(--green);margin-bottom:6px">✓ 정답자 ('+ok.length+'명)</div>',
    '<div style="display:flex;flex-direction:column;gap:5px;margin-bottom:12px">',
    ok.length===0?'<div style="font-size:.78rem;color:var(--muted)">없음</div>':
    ok.map(function(p){return'<div style="display:flex;justify-content:space-between;align-items:center;background:var(--inp);padding:7px 12px;border-radius:8px;border:1px solid var(--border)"><span style="font-weight:800;font-size:.88rem">'+p.nickname+'</span><span class="chip chip-ok">+'+p.earnedScore+'점 ('+p.score+'점)</span></div>';}).join(""),
    '</div>',
    '<div style="font-size:.8rem;font-weight:800;color:var(--red);margin-bottom:6px">✗ 오답/미제출 ('+bad.length+'명)</div>',
    '<div style="display:flex;flex-direction:column;gap:5px">',
    bad.length===0?'<div style="font-size:.78rem;color:var(--muted)">없음</div>':
    bad.map(function(p){return'<div style="display:flex;justify-content:space-between;align-items:center;background:var(--inp);padding:7px 12px;border-radius:8px;border:1px solid var(--border)"><span style="font-weight:800;font-size:.88rem">'+p.nickname+' <span style="font-size:.7rem;color:var(--muted)">"'+(p.userAnswer||'미제출')+'"</span></span><span class="chip chip-err">+0점</span></div>';}).join(""),
    '</div>',
    '<div style="text-align:center;font-size:.76rem;color:var(--muted);margin-top:14px">잠시 후 다음 문제로 이동...</div>',
    '</div>'
  ].join("");
  appEl.appendChild(ov);
}

// 결과
function renderResult(){
  var sorted=curRoom.players.slice().sort(function(a,b){return b.score!==a.score?b.score-a.score:(a.totalTime||0)-(b.totalTime||0);});
  var p1=sorted[0]||{nickname:"-",score:0},p2=sorted[1]||null,p3=sorted[2]||null;
  var div=el("div","display:flex;flex-direction:column;height:100%;padding:18px;overflow-y:auto");
  div.innerHTML=[
    '<div style="text-align:center;margin-bottom:12px"><div style="font-size:1.8rem;margin-bottom:4px">🏆</div>',
    '<h2 style="font-size:1.3rem;font-weight:900">FINAL RESULT</h2>',
    '<p style="color:var(--sub);font-size:.8rem;margin-top:4px">10라운드 대전 종료</p></div>',
    '<div class="podium-wrap">',
    p2?'<div class="podium-slot r2"><div class="p-name">'+p2.nickname+'</div><div class="p-score">'+p2.score+'점</div><div class="podium-box">2</div></div>':'<div class="podium-slot r2"></div>',
    '<div class="podium-slot r1"><div style="font-size:.68rem;font-weight:900;color:var(--gold);margin-bottom:2px">CHAMPION</div><div class="p-name" style="font-size:.95rem">'+p1.nickname+'</div><div class="p-score" style="color:var(--gold)">'+p1.score+'점</div><div class="podium-box">1</div></div>',
    p3?'<div class="podium-slot r3"><div class="p-name">'+p3.nickname+'</div><div class="p-score">'+p3.score+'점</div><div class="podium-box">3</div></div>':'<div class="podium-slot r3"></div>',
    '</div>',
    '<div class="card" style="margin-bottom:14px"><div style="font-weight:700;font-size:.8rem;color:var(--sub);margin-bottom:10px">종합 순위</div>',
    sorted.map(function(p,i){
      return'<div style="display:flex;justify-content:space-between;align-items:center;background:var(--inp);padding:10px 14px;border-radius:10px;border:1px solid var(--border);margin-bottom:'+(i<sorted.length-1?'7':'0')+'px">'+
        '<div style="display:flex;align-items:center;gap:10px">'+
        '<span style="font-weight:900;font-size:.95rem;width:28px;color:'+(i===0?'var(--gold)':'var(--txt)')+'">'+(i+1)+'위</span>'+
        '<span style="font-weight:800;font-size:.9rem">'+p.nickname+'</span></div>'+
        '<span style="font-weight:900;font-size:1rem;color:var(--focus)">'+p.score+'점</span></div>';
    }).join(""),
    '</div>',
    '<button id="lbtn" style="width:100%">로비로 돌아가기</button>'
  ].join("");
  appEl.appendChild(div);
  document.getElementById("lbtn").addEventListener("click",function(){
    leaveRoom(curRoomId,MY_ID);
    curRoomId=null;curRoom=null;appState="LOBBY";render();
  });
}

// ──────────────────────────────────────────────────────────
//  MQTT 메시지 핸들러
// ──────────────────────────────────────────────────────────
function onMqttMsg(msg, topic) {
  var type=msg.type, p=msg.payload||msg;

  // 방 목록 토픽
  if(topic===TOPIC_ROOMS){
    if(type==="ROOM_LIST_UPDATE"&&Array.isArray(p.rooms)){
      mergeRooms(p.rooms);
      if(appState==="LOBBY") render();
    }
    return;
  }

  // 방별 토픽 (curRoomId 관련만 처리)
  if(!curRoomId) return;
  var roomTopic=TOPIC_ROOM+curRoomId;
  if(topic!==roomTopic) return;

  if(type==="ROOM_STATE_UPDATE"){
    if(p.room&&p.room.hostId!==MY_ID){
      upsertRoom(p.room);curRoom=rooms.get(curRoomId)||p.room;
      if(appState==="WAITING") render();
    }
  }
  else if(type==="HOST_CHANGED"){
    if(p.newHostId===MY_ID&&curRoom){curRoom.hostId=MY_ID;publishRoomList();}
    if(p.room){upsertRoom(p.room);curRoom=rooms.get(curRoomId)||p.room;}
    if(appState==="WAITING") render();
  }
  else if(type==="GAME_STARTED"){
    if(p.room){curRoom=p.room;upsertRoom(curRoom);}
    if(p.quizSet) curRoom.quizSet=p.quizSet;
    curRoom.startTime=p.startTime||Date.now();
    upsertRoom(curRoom);
    beginRound(0,curRoom.startTime);
  }
  else if(type==="SUBMITTED_ANSWER"){
    if(!p.sub) return;
    if(!curRoom.subs)curRoom.subs={};
    if(!curRoom.subs[p.qIdx])curRoom.subs[p.qIdx]={};
    curRoom.subs[p.qIdx][p.sub.playerId]=p.sub;
    upsertRoom(curRoom);
    if(isHost()) checkAllSub();
    if(appState==="QUIZ") render();
  }
  else if(type==="ROUND_RESULT"){
    if(!isHost()&&p.result) handleResult(p.result);
  }
  else if(type==="NEXT_ROUND"){
    if(!isHost()){
      if(p.startTime&&curRoom) curRoom.startTime=p.startTime;
      beginRound(p.qIdx,p.startTime);
    }
  }
  else if(type==="GAME_OVER"){
    appState="RESULT";render();
  }
}

// ── 유틸 ─────────────────────────────────────────────────
function el(tag,style){var e=document.createElement(tag);if(style)e.style.cssText=style;return e;}

// ── 시작 ─────────────────────────────────────────────────
initMQTT(onMqttMsg);
render();

})();
</script>
